 fill="#ffffff" stroke="#d7d6cc" stroke-width="1.1"/><text x="847.0" y="508.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#5c6963" text-anchor="middle">E</text><text x="863.0" y="508.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#5c6963" text-anchor="start">Enhancing Safety</text><text x="1120.0" y="508.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="end">+</text><line x1="816.7" y1="532.0" x2="1122.0" y2="532.0" stroke="#d7d6cc" stroke-width="0.8"/><text x="816.7" y="548.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="400" fill="#3d6b66" text-anchor="start">Check marks fidelity · notes stay optional</text><text x="798.7" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#5fd3e0" text-anchor="start" letter-spacing="0.6">PATH COMPASS INTENT</text><text x="798.7" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="798.7" dy="0.0">Marked live with a timestamp; notes stay</tspan><tspan x="798.7" dy="17.0">optional and collapsed so mid-session burden</tspan><tspan x="798.7" dy="17.0">stays low.</tspan></text><line x1="60.0" y1="736.0" x2="1140.0" y2="736.0" stroke="#22345c" stroke-width="0.8"/><text x="60.0" y="756.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10.5" font-weight="400" fill="#9fb0c8" text-anchor="start">Conceptual patterns for portfolio critique — not competitor recreations.</text></g></svg>