<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" id="pattern-fidelity"><style>@import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&amp;family=Lato:wght@400;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');</style><g id="pattern-fidelity-content"><rect x="0" y="0" width="1200" height="780" fill="#060f27"/><text x="60.0" y="56.0" font-family="'Cormorant', Georgia, serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="start">In-Session PRACTICE Fidelity</text><text x="60.0" y="84.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="400" fill="#9fb0c8" text-anchor="start"><tspan x="60.0" dy="0.0">Mark TF-CBT component fidelity live, in session, with optional per-item clinical notes — not reconstructed</tspan><tspan x="60.0" dy="19.0">afterward.</tspan></text><line x1="60.0" y1="136.0" x2="1140.0" y2="136.0" stroke="#22345c" stroke-width="1"/><text x="60.0" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">TYPICAL MARKET APPROACH</text><rect x="60.0" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="78.0" y="206.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.5">TF-CBT FIDELITY FORM</text><line x1="78.0" y1="216.0" x2="383.3" y2="216.0" stroke="#d7d6cc" stroke-width="1"/><rect x="78.0" y="234.0" width="13.0" height="13.0" rx="3" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.2"/><text x="100.0" y="245.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#1c2b2a" text-anchor="start">Psychoeducation</text><rect x="78.0" y="265.0" width="13.0" height="13.0" rx="3" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.2"/><text x="100.0" y="276.0" font-family="'Lato', 'Helvetica