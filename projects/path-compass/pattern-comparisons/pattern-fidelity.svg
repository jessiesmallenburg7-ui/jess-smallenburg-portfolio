"'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#1c2b2a" text-anchor="start">Trauma Narrative</text><rect x="447.3" y="389.0" width="13.0" height="13.0" rx="3" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.2"/><text x="469.3" y="400.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#5c6963" text-anchor="start">In Vivo Mastery</text><rect x="447.3" y="420.0" width="13.0" height="13.0" rx="3" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.2"/><text x="469.3" y="431.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#5c6963" text-anchor="start">Conjoint Session</text><rect x="447.3" y="451.0" width="13.0" height="13.0" rx="3" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.2"/><text x="469.3" y="462.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#5c6963" text-anchor="start">Enhancing Safety</text><rect x="447.3" y="512.0" width="305.3" height="8.0" rx="4" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><rect x="447.3" y="512.0" width="189.3" height="8.0" rx="4" fill="#3d6b66"/><text x="447.3" y="534.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="400" fill="#5c6963" text-anchor="start">Submitted as one batch at session close</text><text x="429.3" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="429.3" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Digital checklist, faster than paper,</tspan><tspan x="429.3" dy="16.0">trackable per client.</tspan></text><text x="429.3" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="429.3" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Binary checks only — no room to capture</tspan><tspan x="429.3" dy="16.0">clinical rationale or response.</tspan></text><text x="798.7" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">PATH COMPASS TARGET</text><rect x="798.7" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="816.7" y="202.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10.5" font-weight="700" fill="#3d6b66" text-anchor="start" letter-spacing="0.4">LIVE SESSION — PRACTICE</text><circle cx="1088.0" cy="196.0" r="4.5" fill="#5fd3e0"/><circle cx="1088.0" cy="196.0" r="8" fill="none" stroke="#5fd3e0" stroke-width="1"/><text x="1098.0" y="200.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="700" fill="#3d6b66" text-anchor="start" letter-spacing="0.5">LIVE</text><line x1="816.7" y1="211.0" x2="1122.0" y2="211.0" stroke="#d7d6cc" stroke-width="1"/><rect x="816.7" y="223.0" width="14.0" height="14.0" rx="3" fill="#3d6b66" stroke="#3d6b66" stroke-width="1.2"/><path d="M 818.9 230.0 L 822.1 233.5 L 828.2 226.2" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="838.0" y="222.0" width="18.0" height="16.0" rx="4" fill="#3d6b66" stroke="#3d6b66" stroke-width="1.1"/><text x="847.0" y="234.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#ffffff" text-anchor="middle">P</text><text x="863.0" y="234.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1c2b2a" text-anchor="start">Psychoeducation</text><text x="1076.0" y="234.0" font-family="'IBM Plex Mono'