e-width="1.6"/><line x1="363.3" y1="210.0" x2="369.3" y2="213.0" stroke="#5c6963" stroke-width="1.6"/><text x="363.3" y="234.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">filled after</text><text x="363.3" y="245.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">session ends</text><text x="60.0" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="60.0" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">Familiar, simple paper form clinicians already</tspan><tspan x="60.0" dy="16.0">know.</tspan></text><text x="60.0" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="60.0" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">Filled from memory after the session —</tspan><tspan x="60.0" dy="16.0">accuracy decays with caseload pressure.</tspan></text><text x="429.3" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">BEST PARTIAL SOLUTION</text><rect x="429.3" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="447.3" y="206.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.4">SESSION FIDELITY — DIGITAL</text><line x1="447.3" y1="216.0" x2="752.7" y2="216.0" stroke="#d7d6cc" stroke-width="1"/><rect x="447.3" y="234.0" width="13.0