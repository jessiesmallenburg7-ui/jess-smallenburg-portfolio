<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" id="pattern-prom"><style>@import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&amp;family=Lato:wght@400;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');</style><g id="pattern-prom-content"><rect x="0" y="0" width="1200" height="780" fill="#060f27"/><text x="60.0" y="56.0" font-family="'Cormorant', Georgia, serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="start">Longitudinal PROM Timeline</text><text x="60.0" y="84.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="400" fill="#9fb0c8" text-anchor="start"><tspan x="60.0" dy="0.0">Track SDQ and FSSQ across five research timepoints, with youth and caregiver respondents both clearly</tspan><tspan x="60.0" dy="19.0">represented.</tspan></text><line x1="60.0" y1="136.0" x2="1140.0" y2="136.0" stroke="#22345c" stroke-width="1"/><text x="60.0" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">TYPICAL MARKET APPROACH</text><rect x="60.0" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="78.0" y="202.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.3">SYMPTOM SCORE — GENERAL MBC</text><line x1="78.0" y1="212.0" x2="383.3" y2="212.0" stroke="#d7d6cc" stroke-width="1"/><line x1="82.0" y1="234.0" x2="379.3" y2="234.0" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="82.0" y1="302.7" x2="379.3" y2="302.7" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="82.0" y1="371.3" x2="379.3" y2="371.3" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="82.0" y1="440.0" x2="379.3" y2="440.0" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><polyline points="82.0,25