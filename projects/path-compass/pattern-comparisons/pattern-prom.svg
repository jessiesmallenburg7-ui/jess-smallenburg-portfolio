n></text><text x="60.0" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="60.0" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">Built for one adult respondent — no concept of</tspan><tspan x="60.0" dy="16.0">youth + caregiver report.</tspan></text><text x="429.3" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">BEST PARTIAL SOLUTION</text><rect x="429.3" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="447.3" y="202.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.2">SDQ TREND — TF-CBT TIMEPOINTS</text><line x1="447.3" y1="212.0" x2="752.7" y2="212.0" stroke="#d7d6cc" stroke-width="1"/><line x1="451.3" y1="232.0" x2="748.7" y2="232.0" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="451.3" y1="283.5" x2="748.7" y2="283.5" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="451.3" y1="335.0" x2="748.7" y2="335.0" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="451.3" y1="386.5" x2="748.7" y2="386.5" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><line x1="451.3" y1="438.0" x2="748.7" y2="438.0" stroke="#d7d6cc" stroke-width="0.8" stroke-dasharray="2 3"/><polyline points="451.3,257.8 525.7,283.5 600.0,309.2 674.3,335.0 748.7,335.0" fill="none" stroke="#3d6b66" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="451.3" cy="257.8" r="4" fill="#edeee7" stroke="#3d6b66" stroke-width="2"/><circle cx="525.7" cy="283.5" r="4" fill="#edeee7" stroke="#3d6b66" stroke-width="2"/><circle cx="600.0" cy="309.2" r="4" fill="#edeee7" stroke="#3d6b66" stroke-width="2"/><circle cx="674.3" cy="335.0" r="4" fill="#edeee7" stroke="#3d6b66" stroke-width="2"/><circle cx="748.7" cy="335.0" r="4" fill="#edeee7" stroke="#3d6b66" stroke-width="2"/><text x="451.3" y="456.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">Base</text><text x="525.7" y="456.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">Mid</text><text x="600.0" y="456.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">Post</text><text x="674.3" y="456.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">12mo</text><text x="748.7" y="456.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="400" fill="#5c6963" text-anchor="middle">18mo</text><text x="447.3" y="484.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#5c6963" text-anchor="start">Right instrument, right timepoints —</text><text x="447.3" y="500.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" fill="#5c6963" text-anchor="start">but still just one respondent&#x27;s score.</text><text x="447.3" y="526.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="400" fill="#5c6963" text-anchor="start">SDQ shown — single respondent only</text><text x="429.3" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="429.3" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Right instrument, right timepoints — real</tspan><tspan x="429.3" dy="16.0">TF-CBT-specific tracking.</tspan></text><text x="429.3" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="429.3" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Still only one respondent — doesn&#x27;t show both</tspan><tspan x="429.3" dy="16.0">SDQ and FSSQ trends with youth AND caregiver report.</tspan></text><text x="798.7" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">PATH COMPASS TARGET</text><rect x="798.7" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="816.7" y="200.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="700" fill="#3d6b66" text-anchor="start" letter-spacing="0.2">SDQ + FSSQ — BOTH RESPONDENTS</text><line x1="816.7" y1="209.0" x2="1122.0" y2="209.0" stroke="#d7d6cc" stroke-width="1"/><text x="818.7" y="232.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="700" fill="#1c2b2a" text-anchor="start">SDQ</text><line x1="818.7" y1="240.0" x2="1120.0" y2="240.0" stroke="#d7d6cc" stroke-width="0.6" stroke-dasharray="2 3"/><line x1="818.7" y1="261.0" x2="1120.0" y2="261.0" stroke="#d7d6cc" stroke-width="0.6" stroke-dasharray="2 3"/><line x1="818.7" y1="282.0" x2="1120.0" y2="282.0" stroke="#d7d6cc" stroke-width="0.6" stroke-dasharray="2 3"/><line x1="818.7" y1="303.0" x2="1120.0" y2="303.0" stroke="#d7d6cc" stroke-width="0.6" stroke-dasharray="2 3"/><line x1="818.7" y1="324.0" x2="1120.0" y2="324.0" stroke="#d7d6cc" stroke-width="0.6" stroke-dasharray="2 3"/><polyline points="818.7,240.0 894.0,261.0 969.3,282.0 1044.7,303.0 1120.0,303.0" fill="none" stroke="#3d6b