<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" id="pattern-privacy"><style>@import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&amp;family=Lato:wght@400;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');</style><g id="pattern-privacy-content"><rect x="0" y="0" width="1200" height="780" fill="#060f27"/><text x="60.0" y="56.0" font-family="'Cormorant', Georgia, serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="start">Youth Privacy &amp; Sharing</text><text x="60.0" y="100.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="400" fill="#9fb0c8" text-anchor="start"><tspan x="60.0" dy="0.0">Give youth real, granular, reversible control over what a caregiver or clinician can see — not a one-time</tspan><tspan x="60.0" dy="26.0">blanket switch.</tspan></text><line x1="60.0" y1="136.0" x2="1140.0" y2="136.0" stroke="#22345c" stroke-width="1"/><text x="60.0" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">TYPICAL MARKET APPROACH</text><rect x="60.0" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="78.0" y="206.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.5">SHARING</text><line x1="78.0" y1="216.0" x2="383.3" y2="216.0" stroke="#d7d6cc" stroke-width="1"/><text x="78.0" y="266.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="600" fill="#1c2b2a" text-anchor="start">Share with parent</text><rect x="201.7" y="296.0" width="58.0" height="28.0" rx="14.0" fill="#3d6b66"/><circle cx="245.7" cy="310.0" r="11.0" fill="#ffffff"/><text x="230.7" y="350.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="12" font-weight="600" fill="#5c6963" text-anchor="middle">ON</text><text x="78.0" y="484.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">One switch controls everything,</text><text x="78.0" y="500.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">all-or-nothing.</text><text x="60.0" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="60.0" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">Simple to understand — one switch, one</tspan><tspan x="60.0" dy="16.0">decision.</tspan></text><text x="60.0" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="60.0" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">All-or-nothing. No way to share selectively or</tspan><tspan x="60.0" dy="16.0">change course.</tspan></text><text x="429.3" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">BEST PARTIAL SOLUTION</text><rect x="429.3" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="447.3" y="204.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.4">SHARING SETTINGS</text><line x1="447.3" y1="214.0" x2="752.7" y2="214.0" stroke="#d7d6cc" stroke-width="1"/><text x="447.3" y="238.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#1c2b2a" text-anchor="start">Mood check-ins</text><rect x="720.7" y="226.0" width="32.0" height="16.0" rx="8.0" fill="#3d6b66" stroke="#d7d6cc" stroke-width="1"/><circle cx="744.7" cy="234.0" r="5.5" fill="#ffffff"/><text x="447.3" y="268.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#1c2b2a" text-anchor="start">Journal entries</text><rect x="720.7" y="256.0" width="32.0" height="16.0" rx="8.0" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><circle cx="728.7" cy="264.0" r="5.5" fill="#5c6963"/><text x="447.3" y="298.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#1c2b2a" text-anchor="start">Session summaries</text><rect x="720.7" y="286.0" width="32.0" height="16.0" rx="8.0" fill="#3d6b66" stroke="#d7d6cc" stroke-width="1"/><circle cx="744.7" cy="294.0" r="5.5" fill="#ffffff"/><text x="447.3" y="328.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#1c2b2a" text-anchor="start">Assessment scores</text><rect x="720.7" y="316.0" width="32.0" height="16.0" rx="8.0" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><circle cx="728.7" cy="324.0" r="5.5" fill="#5c6963"/><text x="447.3" y="494.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">Set once at intake —</text><text x="447.3" y="510.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">easy to forget it&#x27;s even there.</text><text x="429.3" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="429.3" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Per-category control is a real step toward</tspan><tspan x="429.3" dy="16.0">nuance.</tspan></text><text x="429.3" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="429.3" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Set once at intake — easy to forget it exists,</tspan><tspan x="429.3" dy="16.0">hard to revisit.</tspan></text><text x="798.7" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">PATH COMPASS TARGET</text><rect x="798.7" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="816.7" y="200.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="700" fill="#3d6b66" text-anchor="start" letter-spacing="0.2">NIA&#x27;S SPACE — PRIVATE BY DEFAULT</text><line x1="816.7" y1="210.0" x2="1122.0" y2="210.0" stroke="#d7d6cc" stroke-width="1"/><rect x="814.7" y="216.0" width="309.3" height="46.0" rx="8" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><text x="826.7" y="231.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#1c2b2a" text-anchor="start">Today&#x27;s check-in</text><rect x="826.7" y="241.0" width="128.0" height="16.0" rx="8" fill="none" stroke="#5c6963" stroke-width="1"/><text x="890.7" y="252.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.3" font-weight="400" fill="#5c6963" text-anchor="middle">Not shared</text><rect x="1068.0" y="224.0" width="56.0" height="20.0" rx="10" fill="none" stroke="#3d6b66" stroke-width="1.3"/><text x="1096.0" y="237.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.5" font-weight="600" fill="#3d6b66" text-anchor="middle">Share ▾</text><rect x="814.7" y="274.0" width="309.3" height="46.0" rx="8" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><text x="826.7" y="289.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#1c2b2a" text-anchor="start">Session 4 narrative</text><rect x="826.7" y="299.0" width="128.0" height="16.0" rx="8" fill="#3d6b66" stroke="#3d6b66" stroke-width="1"/><text x="890.7" y="310.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.3" font-weight="400" fill="#ffffff" text-anchor="middle">Shared · Caregiver</text><rect x="1068.0" y="282.0" width="56.0" height="20.0" rx="10" fill="none" stroke="#3d6b66" stroke-width="1.3"/><text x="1096.0" y="295.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.5" font-weight="600" fill="#3d6b66" text-anchor="middle">Revoke</text><rect x="814.7" y="332.0" width="309.3" height="46.0" rx="8" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><text x="826.7" y="347.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="600" fill="#1c2b2a" text-anchor="start">Coping skills note</text><rect x="826.7" y="357.0" width="128.0" height="16.0" rx="8" fill="#3d6b66" stroke="#3d6b66" stroke-width="1"/><text x="890.7" y="368.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.3" font-weight="400" fill="#ffffff" text-anchor="middle">Shared · Clinician</text><rect x="1068.0" y="340.0" width="56.0" height="20.0" rx="10" fill="none" stroke="#3d6b66" stroke-width="1.3"/><text x="1096.0" y="353.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.5" font-weight="600" fill="#3d6b66" text-anchor="middle">Revoke</text><text x="816.7" y="408.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#5c6963" text-anchor="start">Share target is per-entry: caregiver, clinician,</text><text x="816.7" y="421.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#5c6963" text-anchor="start">or both — always reversible.</text><text x="798.7" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#5fd3e0" text-anchor="start" letter-spacing="0.6">PATH COMPASS INTENT</text><text x="798.7" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="798.7" dy="0.0">Private by default, entry by entry — she</tspan><tspan x="798.7" dy="17.0">chooses caregiver, clinician, or both, and can</tspan><tspan x="798.7" dy="17.0">revoke any time.</tspan></text><line x1="60.0" y1="736.0" x2="1140.0" y2="736.0" stroke="#22345c" stroke-width="0.8"/><text x="60.0" y="756.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10.5" font-weight="400" fill="#9fb0c8" text-anchor="start">Conceptual patterns for portfolio critique — not competitor recreations.</text></g></svg>