<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" id="pattern-caregiver"><style>@import url('https://fonts.googleapis.com/css2?family=Cormorant:wght@500;600;700&amp;family=Lato:wght@400;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap');</style><g id="pattern-caregiver-content"><rect x="0" y="0" width="1200" height="780" fill="#060f27"/><text x="60.0" y="56.0" font-family="'Cormorant', Georgia, serif" font-size="36" font-weight="600" fill="#ffffff" text-anchor="start">Caregiver Parallel Participation</text><text x="60.0" y="100.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="14.5" font-weight="400" fill="#9fb0c8" text-anchor="start"><tspan x="60.0" dy="0.0">Support parallel-session participation without blame — recaps, clearly labeled informant forms, non-punitive</tspan><tspan x="60.0" dy="26.0">rescheduling.</tspan></text><line x1="60.0" y1="136.0" x2="1140.0" y2="136.0" stroke="#22345c" stroke-width="1"/><text x="60.0" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">TYPICAL MARKET APPROACH</text><rect x="60.0" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="78.0" y="206.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.5">CALENDAR</text><line x1="78.0" y1="216.0" x2="383.3" y2="216.0" stroke="#d7d6cc" stroke-width="1"/><rect x="90.0" y="242.0" width="281.3" height="64.0" rx="8" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><text x="106.0" y="266.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#1c2b2a" text-anchor="start">Session — Tue 4:00 PM</text><rect x="106.0" y="280.0" width="66.0" height="20.0" rx="10" fill="#b23b3b"/><text x="139.0" y="294.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#ffffff" text-anchor="middle">MISSED</text><text x="78.0" y="494.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">A flag with no context and</text><text x="78.0" y="510.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">no next step.</text><text x="60.0" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="60.0" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">At least the missed session is visible</tspan><tspan x="60.0" dy="16.0">somewhere.</tspan></text><text x="60.0" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="60.0" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="60.0" dy="0.0">A punitive red flag with no context and no</tspan><tspan x="60.0" dy="16.0">path forward.</tspan></text><text x="429.3" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">BEST PARTIAL SOLUTION</text><rect x="429.3" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><text x="447.3" y="204.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5c6963" text-anchor="start" letter-spacing="0.4">SESSION RECAP — TEXT</text><line x1="447.3" y1="214.0" x2="752.7" y2="214.0" stroke="#d7d6cc" stroke-width="1"/><rect x="449.3" y="228.0" width="301.3" height="248.0" rx="8" fill="#ffffff" stroke="#d7d6cc" stroke-width="1"/><text x="463.3" y="252.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1c2b2a" text-anchor="start">Today Nia practiced relaxation</text><text x="463.3" y="272.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1c2b2a" text-anchor="start">and cognitive coping skills.</text><text x="463.3" y="292.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1c2b2a" text-anchor="start">No action needed from you</text><text x="463.3" y="312.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1c2b2a" text-anchor="start">at this time.</text><text x="447.3" y="494.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">One-directional — nothing to</text><text x="447.3" y="510.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="10.5" font-weight="400" fill="#5c6963" text-anchor="start">do, no way to reschedule.</text><text x="429.3" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#9fb0c8" text-anchor="start" letter-spacing="0.6">WHAT&#x27;S WORKING</text><text x="429.3" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">Caregivers get real information about the</tspan><tspan x="429.3" dy="16.0">session.</tspan></text><text x="429.3" y="634.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#e0a45f" text-anchor="start" letter-spacing="0.6">GAP</text><text x="429.3" y="650.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="429.3" dy="0.0">One-directional — nothing to do, no way to</tspan><tspan x="429.3" dy="16.0">reschedule.</tspan></text><text x="798.7" y="162.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="11" font-weight="600" fill="#5fd3e0" text-anchor="start" letter-spacing="0.8">PATH COMPASS TARGET</text><rect x="798.7" y="176.0" width="341.3" height="390.0" rx="10" fill="#edeee7"/><rect x="895.3" y="188.0" width="148.0" height="324.0" rx="20" fill="#ffffff" stroke="#d7d6cc" stroke-width="1.4"/><text x="969.3" y="210.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10" font-weight="700" fill="#3d6b66" text-anchor="middle" letter-spacing="0.5">DENISE</text><line x1="911.3" y1="220.0" x2="1027.3" y2="220.0" stroke="#d7d6cc" stroke-width="1"/><text x="911.3" y="238.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9" font-weight="600" fill="#5c6963" text-anchor="start">Recap:</text><text x="911.3" y="251.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="400" fill="#1c2b2a" text-anchor="start">Practiced coping</text><text x="911.3" y="263.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="9.5" font-weight="400" fill="#1c2b2a" text-anchor="start">skills today.</text><rect x="911.3" y="276.0" width="116.0" height="32.0" rx="7" fill="#3d6b66"/><text x="969.3" y="290.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.6" font-weight="600" fill="#ffffff" text-anchor="middle">Start SDQ/FSSQ</text><text x="969.3" y="302.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7.3" font-weight="400" fill="#cfe8e5" text-anchor="middle">Informant report</text><rect x="911.3" y="316.0" width="116.0" height="26.0" rx="7" fill="none" stroke="#3d6b66" stroke-width="1.3"/><text x="969.3" y="333.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="8.2" font-weight="700" fill="#3d6b66" text-anchor="middle">Find Another Time</text><text x="969.3" y="494.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7.6" font-weight="400" fill="#5c6963" text-anchor="middle" font-style="italic">Parallel to Nia&#x27;s own report</text><text x="969.3" y="506.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="7.6" font-weight="400" fill="#5c6963" text-anchor="middle" font-style="italic">— not the only source</text><text x="798.7" y="586.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="9.5" font-weight="700" fill="#5fd3e0" text-anchor="start" letter-spacing="0.6">PATH COMPASS INTENT</text><text x="798.7" y="602.0" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#edeee7" text-anchor="start"><tspan x="798.7" dy="0.0">Labeled by what it opens — never &#x27;Check-in&#x27; —</tspan><tspan x="798.7" dy="17.0">plus a warm reschedule prompt in place of any</tspan><tspan x="798.7" dy="17.0">red flag.</tspan></text><line x1="60.0" y1="736.0" x2="1140.0" y2="736.0" stroke="#22345c" stroke-width="0.8"/><text x="60.0" y="756.0" font-family="'IBM Plex Mono', 'Courier New', monospace" font-size="10.5" font-weight="400" fill="#9fb0c8" text-anchor="start">Conceptual patterns for portfolio critique — not competitor recreations.</text></g></svg>