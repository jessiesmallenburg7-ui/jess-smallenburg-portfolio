<text x="936.0" y="296.0" text-anchor="start" fill="#534AB7" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:20.0px;font-weight:700;letter-spacing:0.6px;">DESIGN DECISION — STATUS FIRST</text>
<text x="936.0" y="332.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">The status banner is the first element on every screen — not after a scroll. Diane should never have to hunt for “is mom okay.” Ambiguity</text>
<text x="936.0" y="365.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">creates active emotional distress, not neutral confusion.</text>
<rect x="900.0" y="450.0" width="1740.0" height="174.0" rx="24.0" fill="#FFFFFF" stroke="#D8D7CF" stroke-width="1.6" filter="url(#cardShadow)"/>
<rect x="900.0" y="450.0" width="6.0" height="174.0" rx="3.0" fill="#534AB7" stroke="none" stroke-width="2.0"/>
<text x="936.0" y="498.0" text-anchor="start" fill="#534AB7" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:20.0px;font-weight:700;letter-spacing:0.6px;">DESIGN DECISION — PLAIN LANGUAGE</text>
<text x="936.0" y="534.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">No ICD codes, no clinical abbreviations, no medical jargon. “Blood sugar is a little high” replaces “HbA1c 9.1% — uncontrolled T2DM.” Dose</text>
<text x="936.0" y="567.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">changes are proactively surfaced — Diane doesn't wait until mom runs out of the wrong medication.</text>
<rect x="900.0" y="652.0" width="1740.0" height="174.0" rx="24.0" fill="#FFFFFF" stroke="#D8D7CF" stroke-width="1.6" filter="url(#cardShadow)"/>
<rect x="900.0" y="652.0" width="6.0" height="174.0" rx="3.0" fill="#534AB7" stroke="none" stroke-width="2.0"/>
<text x="936.0" y="700.0" text-anchor="start" fill="#534AB7" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:20.0px;font-weight:700;letter-spacing:0.6px;">DESIGN DECISION — PRIOR AUTH TRACKER</text>
<text x="936.0" y="736.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">Diane called the pharmacy twice with no resolution. The prior auth tracker is a single authoritative source: submitted → under review →</text>
<text x="936.0" y="769.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">approved. No phone calls required. Status is shown inline, with estimated timeline.</text>
<rect x="900.0" y="854.0" width="1740.0" height="174.0" rx="24.0" fill="#FFFFFF" stroke="#D8D7CF" stroke-width="1.6" filter="url(#cardShadow)"/>
<rect x="900.0" y="854.0" width="6.0" height="174.0" rx="3.0" fill="#534AB7" stroke="none" stroke-width="2.0"/>
<text x="936.0" y="902.0" text-anchor="start" fill="#534AB7" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:20.0px;font-weight:700;letter-spacing:0.6px;">DESIGN DECISION — SHAREABLE SUMMARY</text>
<text x="936.0" y="938.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">Diane coordinates with her brother Carlos. The share button produces a plain-language summary (text or PDF) she can forward without having</text>
<text x="936.0" y="971.0" text-anchor="start" fill="#6B6A64" style="font-family:-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:23.0px;font-weight:400;">to interpret clinical content herself first.</text>
