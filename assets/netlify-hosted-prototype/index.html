document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a1c58ba4-6185-407c-a8dd-54299f5ad42b\"><\/script>\n<\/head>\n<body>\n<x-dc>\n\n<helmet>\n\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  \/* CANVAS vs PAGE: body is now a visibly different color from the page frame\n     below, and never scrolls itself (overflow:hidden) -- the frame is its own\n     scroll container (see .lc-page-frame), which also keeps the sticky header\n     correctly anchored to the frame's top edge during scroll, instead of\n     escaping above the frame border as it would with page-level scrolling. *\/\n  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#D8D7D0;color:#2A2A28;-webkit-font-smoothing:antialiased;overflow:hidden;}\n  button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:rgba(29,158,117,0.18);}\n  \/* === Tap\/click feedback: shade any interactive element on press === *\/\n  button:active,[role=\"button\"]:active,a:active,[role=\"tab\"]:active{filter:brightness(0.93);}\n  \/* === A11Y: Skip navigation (WCAG 2.4.1) === *\/\n  .lc-skip{position:absolute;left:-9999px;top:10px;z-index:200;background:#1D9E75;color:#fff;padding:10px 18px;border-radius:8px;font-size:14.5px;font-weight:500;text-decoration:none;white-space:nowrap;}\n  .lc-skip:focus{left:12px;outline:2px solid #fff;outline-offset:2px;}\n\n  \/* === A11Y: Visible focus ring (WCAG 2.4.7) === *\/\n  :focus-visible{outline:2px solid #534AB7;outline-offset:2px;border-radius:4px;}\n  button:focus-visible,[tabindex=\"0\"]:focus-visible,a:focus-visible{outline:2px solid #534AB7;outline-offset:2px;border-radius:4px;}\n\n  \/* === A11Y: Screen-reader only === *\/\n  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}\n\n  \/* === PAGE FRAME: the visible boundary around all page content \u2014 an inset,\n       self-scrolling \"page\" sitting on the body's canvas color. Margin creates\n       the gutter that makes the border actually perceptible (a border with\n       nothing outside it to contrast against is effectively invisible, which\n       was the issue with the previous full-bleed version). ===  *\/\n  .lc-page-frame{\n    height:calc(100vh - 40px);\n    margin:20px;\n    overflow-y:auto;\n    overflow-x:hidden;\n    background:#F5F5F0;\n    border:2px solid #C4C3BB;\n    border-radius:12px;\n    -webkit-overflow-scrolling:touch;\n  }\n\n  \/* === RESPONSIVE: mobile < 768px \u2014 hide non-essential header chrome === *\/\n  @media(max-width:767px){\n    .lc-sm-hide{display:none!important;}\n    \/* Enforce 44\u00d744 px minimum touch targets in sticky header (WCAG 2.5.5) *\/\n    header button,header a{min-height:44px!important;min-width:44px!important;display:inline-flex!important;align-items:center!important;justify-content:center!important;}\n    .lc-page-frame{height:calc(100vh - 20px);margin:10px;border-radius:8px;}\n  }\n  \/* === RESPONSIVE: show only on mobile === *\/\n  @media(min-width:768px){.lc-sm-only{display:none!important;}}\n\n  \/* === ANIMATIONS === *\/\n  @keyframes lc-fade{from{transform:translateY(7px);}to{transform:translateY(0);}}\n  @keyframes lc-toast{from{transform:translateX(18px);}to{transform:translateX(0);}}\n  @keyframes lc-slide{from{transform:translateY(-6px);}to{transform:translateY(0);}}\n  @keyframes lc-pop{from{transform:scale(.97);}to{transform:scale(1);}}\n<\/style>\n<\/helmet>\n\n<!-- Skip navigation link (WCAG 2.4.1) -->\n<a href=\"#lc-main\" class=\"lc-skip\">Skip to main content<\/a>\n\n<div class=\"lc-page-frame\">\n\n  <!-- ===== TOP BAR =====\n       Content lives in an inner max-width wrapper (headerMaxWidth, screen-\n       dependent) so the logo\/buttons\/avatar align with the <main> content's\n       left\/right edges on wide monitors, instead of sitting flush against the\n       browser edges while the narrower centered content sits inset below it. -->\n  <header role=\"banner\" style=\"position:sticky;top:0;z-index:40;min-height:64px;background:#FFFFFF;border-bottom:0.5px solid #E2E1DA;display:flex;align-items:center;\">\n    <div style=\"width:100%;max-width:{{ headerMaxWidth }};margin:0 auto;display:flex;align-items:center;gap:{{ headerGap }};padding:10px {{ headerPadX }};flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:center;gap:9px;\">\n      <!-- Avatar next to name -- aria-hidden since the adjacent text already\n           announces \"Dr. Laura Mitchell\" to screen readers; the account-menu\n           avatar on the far right keeps its own aria-label since it has no\n           adjacent text there. -->\n      <div aria-hidden=\"true\" style=\"width:28px;height:28px;border-radius:50%;background:#534AB7;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex:0 0 auto;\">LM<\/div>\n      <div style=\"display:flex;flex-direction:column;line-height:1.2;white-space:nowrap;\">\n        <span style=\"font-size:16.5px;font-weight:700;color:#1A3A2C;\">Dr. Laura Mitchell <span aria-hidden=\"true\" style=\"font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:#157A58;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:5px;padding:2px 6px;vertical-align:middle;\">Attending<\/span><\/span>\n        <span class=\"lc-sm-hide\" style=\"font-size:13px;color:#6B6A64;\">Internal medicine \u00b7 Ambulatory<\/span>\n      <\/div>\n    <\/div>\n    <div aria-hidden=\"true\" style=\"flex:1;\"><\/div>\n    <button onclick=\"{{ toggleClinic }}\" aria-label=\"{{ clinicAriaLabel }}\" style=\"{{ clinicBadgeStyle }}\">\n      <span aria-hidden=\"true\" style=\"width:7px;height:7px;border-radius:50%;background:{{ clinicDot }};display:inline-block;\"><\/span>\n      <span class=\"lc-sm-hide\" style=\"margin-left:4px;white-space:nowrap;\">{{ clinicLabel }}<\/span>\n    <\/button>\n    <button onclick=\"{{ toggleSimplified }}\" aria-pressed=\"{{ simplified }}\" aria-label=\"{{ simpAriaLabel }}\" class=\"lc-sm-hide\" style=\"{{ simpBtnStyle }}\">{{ simpLabel }}<\/button>\n    <button onclick=\"{{ toggleFlow }}\" aria-label=\"Show prototype flow diagram and notes\" style=\"height:36px;padding:0 12px;border-radius:8px;border:0.5px solid #E2E1DA;background:#fff;font-size:14px;color:#2A2A28;display:flex;align-items:center;gap:6px;white-space:nowrap;\" style-hover=\"background:#F5F5F0;\">\n      <span aria-hidden=\"true\" style=\"font-size:14.5px;\">\u229e<\/span><span class=\"lc-sm-hide\"> Flow &amp; notes<\/span>\n    <\/button>\n    <\/div>\n  <\/header>\n\n  <!-- ===== SCREEN: DASHBOARD ===== -->\n  <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n  <main id=\"lc-main\" tabindex=\"-1\" aria-label=\"Dashboard\" style=\"animation:lc-fade .18s ease;max-width:1280px;margin:0 auto;padding:{{ mainPad }};\">\n\n    <sc-if value=\"{{ simplified }}\" hint-placeholder-val=\"{{ false }}\">\n      <div role=\"status\" aria-live=\"polite\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:12px;padding:12px 16px;margin-bottom:18px;flex-wrap:wrap;\">\n        <span style=\"font-size:15.5px;color:#157A58;\">Simplified view \u2014 fewer panels, larger text.<\/span>\n        <button onclick=\"{{ toggleSimplified }}\" style=\"background:none;border:none;color:#1D9E75;font-size:15.5px;font-weight:500;text-decoration:underline;min-height:44px;padding:4px 8px;\">Switch to standard<\/button>\n      <\/div>\n    <\/sc-if>\n\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;\">\n      <div>\n        <div style=\"font-size:12.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#1D9E75;margin-bottom:5px;\">Daily clinical summary<\/div>\n        <div style=\"font-size:14.5px;color:#6B6A64;margin-bottom:2px;\" aria-hidden=\"true\">Thursday, June 26 \u00b7 Morning clinic<\/div>\n        <h1 style=\"margin:0;font-size:24px;font-weight:500;letter-spacing:-0.02em;\">Good morning, Dr. Mitchell<\/h1>\n      <\/div>\n    <\/div>\n\n    <!-- KPI ROW \u2014 responsive: mobile 2\u00d72, tablet 2\u00d72, desktop 4\u00d71 -->\n    <section aria-label=\"Clinic summary statistics\" style=\"{{ kpiGridStyle }}\">\n      <div style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 16px;\">\n        <div style=\"font-size:14px;color:#6B6A64;margin-bottom:8px;\">Patients today<\/div>\n        <div style=\"display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;\">\n          <span style=\"font-size:28px;font-weight:500;\">18<\/span>\n          <span style=\"font-size:14px;color:#6B6A64;\">4 seen \u00b7 14 left<\/span>\n        <\/div>\n        <div role=\"progressbar\" aria-valuenow=\"22\" aria-valuemin=\"0\" aria-valuemax=\"100\" aria-label=\"4 of 18 patients seen today\" style=\"margin-top:10px;height:6px;border-radius:6px;background:#EDEDE7;overflow:hidden;\">\n          <div style=\"width:22%;height:100%;background:#1D9E75;border-radius:6px;\"><\/div>\n        <\/div>\n      <\/div>\n      <button onclick=\"{{ goAlerts }}\" aria-label=\"{{ kpiAlertsAria }}\" style=\"{{ kpiAlertsCardStyle }}\" style-hover=\"background:#FDF1F1;\" style-active=\"filter:brightness(0.95);\">\n        <div style=\"font-size:14px;color:{{ kpiAlertsIconColor }};margin-bottom:8px;display:flex;align-items:center;gap:6px;\"><span aria-hidden=\"true\">{{ kpiAlertsIcon }}<\/span> Alerts pending<\/div>\n        <div style=\"display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;\">\n          <span aria-hidden=\"true\" style=\"font-size:28px;font-weight:500;color:#2A2A28;\">{{ alertsPendingCount }}<\/span>\n          <sc-if value=\"{{ hasCriticalAlert }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"font-size:12.5px;font-weight:600;color:#fff;background:#E24B4A;border-radius:5px;padding:2px 7px;\">1 critical<\/span>\n          <\/sc-if>\n          <span style=\"font-size:12.5px;font-weight:600;color:#4A4A46;background:#F0EFEA;border-radius:5px;padding:2px 7px;\">1 informational<\/span>\n        <\/div>\n        <div aria-hidden=\"true\" style=\"margin-top:10px;font-size:13.5px;color:{{ kpiAlertsIconColor }};font-weight:500;\">{{ kpiAlertsCta }}<\/div>\n      <\/button>\n      <button onclick=\"{{ toastNotes }}\" aria-label=\"3 notes to sign from yesterday \u2014 tap to open sign queue\" style=\"text-align:left;background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 16px;min-height:80px;\" style-hover=\"background:#FBF6EC;\">\n        <div style=\"font-size:14px;color:#6B6A64;margin-bottom:8px;\">Notes to sign<\/div>\n        <div style=\"display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;\"><span aria-hidden=\"true\" style=\"font-size:28px;font-weight:500;color:#C9831A;\">3<\/span><span style=\"font-size:14px;color:#6B6A64;\">from yesterday<\/span><\/div>\n        <div aria-hidden=\"true\" style=\"margin-top:10px;font-size:13.5px;color:#C9831A;font-weight:500;\">Open sign queue \u2192<\/div>\n      <\/button>\n      <div style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 16px;\">\n        <div style=\"font-size:14px;color:#6B6A64;margin-bottom:8px;\">Inbox tasks<\/div>\n        <div style=\"display:flex;align-items:baseline;gap:6px;\"><span style=\"font-size:28px;font-weight:500;\">7<\/span><\/div>\n        <div style=\"margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;\">\n          <span style=\"font-size:12.5px;padding:2px 7px;border-radius:6px;background:#F0EFEA;color:#4A4A46;\">4 refills<\/span>\n          <span style=\"font-size:12.5px;padding:2px 7px;border-radius:6px;background:#F0EFEA;color:#4A4A46;\">3 messages<\/span>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- Dashboard columns \u2014 responsive: mobile stack, tablet 1.2\/1, desktop 1.7\/1 -->\n    <div style=\"{{ dashColsStyle }}\">\n\n      <!-- PATIENT QUEUE -->\n      <section aria-labelledby=\"queue-heading\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px;flex-wrap:wrap;gap:8px;\">\n          <h2 id=\"queue-heading\" style=\"margin:0;font-size:15.5px;font-weight:500;\">Patient queue<\/h2>\n          <span style=\"font-size:13.5px;color:#6B6A64;\">Sorted by appointment time<\/span>\n        <\/div>\n        <div role=\"list\" style=\"display:flex;flex-direction:column;gap:8px;\">\n          <sc-for list=\"{{ patients }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div role=\"listitem\">\n              <div role=\"button\" tabindex=\"0\" onclick=\"{{ p.go }}\" onkeydown=\"{{ p.keyDown }}\" aria-label=\"{{ p.aria }}\" style=\"background:#fff;border:0.5px solid #E2E1DA;border-left:3px solid {{ p.edge }};border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:14px;min-height:64px;cursor:pointer;\" style-hover=\"background:#FAFAF7;\">\n                <div aria-hidden=\"true\" style=\"width:46px;font-size:14.5px;font-weight:500;color:#6B6A64;flex:0 0 auto;\">{{ p.time }}<\/div>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;\">\n                    <span style=\"font-size:15.5px;font-weight:500;\">{{ p.name }}<\/span>\n                    <span style=\"font-size:13.5px;color:#6B6A64;\">{{ p.demo }}<\/span>\n                    <sc-if value=\"{{ p.deteriorating }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"font-size:12px;font-weight:500;color:#E24B4A;background:#FBE7E7;border-radius:5px;padding:2px 6px;display:inline-flex;align-items:center;gap:4px;\"><span aria-hidden=\"true\">\u25b2<\/span> deteriorating<\/span>\n                    <\/sc-if>\n                  <\/div>\n                  <div style=\"display:flex;flex-wrap:wrap;gap:5px;\">\n                    <sc-for list=\"{{ p.dx }}\" as=\"d\" hint-placeholder-count=\"2\">\n                      <span style=\"font-size:12.5px;padding:2px 7px;border-radius:5px;background:#EEF0F2;color:#3A4A58;\">{{ d }}<\/span>\n                    <\/sc-for>\n                    <sc-for list=\"{{ p.sdoh }}\" as=\"s\" hint-placeholder-count=\"0\">\n                      <span style=\"font-size:12.5px;padding:2px 7px;border-radius:5px;background:#FAEEDA;color:#9A6B14;display:inline-flex;align-items:center;gap:4px;\"><span aria-hidden=\"true\">\u25c6<\/span> {{ s }}<\/span>\n                    <\/sc-for>\n                  <\/div>\n                <\/div>\n                <div style=\"text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex:0 0 auto;\">\n                  <span style=\"font-size:12.5px;color:{{ p.statusColor }};font-weight:500;\">{{ p.status }}<\/span>\n                  <span class=\"lc-sm-hide\" style=\"font-size:12.5px;color:#A8A79F;\">{{ p.complexity }}<\/span>\n                <\/div>\n                <div aria-hidden=\"true\" style=\"color:#C4C3BB;font-size:20px;\">\u203a<\/div>\n              <\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/section>\n\n      <!-- RIGHT RAIL -->\n      <aside aria-label=\"Priority alerts and quick actions\">\n        <section aria-labelledby=\"alerts-heading\" style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 15px;margin-top:22px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n            <h2 id=\"alerts-heading\" style=\"margin:0;font-size:15.5px;font-weight:500;\">Priority alerts<\/h2>\n            <span aria-hidden=\"true\" style=\"font-size:12.5px;color:#6B6A64;\">by severity<\/span>\n          <\/div>\n          <div role=\"list\" style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ alerts }}\" as=\"a\" hint-placeholder-count=\"2\">\n              <div role=\"listitem\">\n                <button onclick=\"{{ a.go }}\" aria-label=\"{{ a.aria }}\" style=\"text-align:left;background:{{ a.bg }};border:{{ a.border }};border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;width:100%;min-height:44px;\" style-hover=\"filter:brightness(0.98);\">\n                  <span aria-hidden=\"true\" style=\"font-size:14.5px;color:{{ a.iconColor }};line-height:1.3;\">{{ a.icon }}<\/span>\n                  <div style=\"flex:1;\">\n                    <div style=\"font-size:14px;font-weight:500;color:{{ a.titleColor }};margin-bottom:2px;\">{{ a.title }}<\/div>\n                    <div style=\"font-size:13px;color:#6B6A64;line-height:1.35;\">{{ a.detail }}<\/div>\n                    <div aria-hidden=\"true\" style=\"font-size:12px;color:#A8A79F;margin-top:4px;\">{{ a.time }}<\/div>\n                  <\/div>\n                <\/button>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/section>\n\n        <sc-if value=\"{{ showQuickActions }}\" hint-placeholder-val=\"{{ true }}\">\n        <section aria-labelledby=\"qa-heading\" style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 15px;margin-top:16px;\">\n          <h2 id=\"qa-heading\" style=\"margin:0 0 10px;font-size:15.5px;font-weight:500;\">Quick actions<\/h2>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <button onclick=\"{{ startNext }}\" style=\"display:flex;align-items:center;justify-content:space-between;background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:11px 13px;font-size:14.5px;font-weight:500;min-height:44px;\" style-hover=\"background:#188862;\">\n              <span>Start next visit<\/span><span aria-hidden=\"true\">\u2192<\/span>\n            <\/button>\n            <button onclick=\"{{ toastNotes }}\" aria-label=\"Sign 3 pending notes\" style=\"display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid #E2E1DA;border-radius:10px;padding:11px 13px;font-size:14.5px;color:#2A2A28;min-height:44px;\" style-hover=\"background:#F5F5F0;\">\n              <span>Sign pending notes<\/span>\n              <span aria-hidden=\"true\" style=\"background:#FAEEDA;color:#9A6B14;border-radius:6px;padding:1px 7px;font-size:12.5px;font-weight:500;\">3<\/span>\n            <\/button>\n            <button onclick=\"{{ toastMessages }}\" aria-label=\"Team messages \u2014 5 unread\" style=\"display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid #E2E1DA;border-radius:10px;padding:11px 13px;font-size:14.5px;color:#2A2A28;min-height:44px;\" style-hover=\"background:#F5F5F0;\">\n              <span>Team messages<\/span>\n              <span aria-hidden=\"true\" style=\"background:#EEF0F2;color:#3A4A58;border-radius:6px;padding:1px 7px;font-size:12.5px;font-weight:500;\">5<\/span>\n            <\/button>\n            <button onclick=\"{{ launchOnboarding }}\" aria-label=\"Replay the product tour\" style=\"display:flex;align-items:center;justify-content:space-between;background:#fff;border:0.5px solid #E2E1DA;border-radius:10px;padding:11px 13px;font-size:14.5px;color:#2A2A28;min-height:44px;\" style-hover=\"background:#F5F5F0;\">\n              <span>Replay tutorial<\/span>\n              <span aria-hidden=\"true\" style=\"font-size:14px;\">\u21bb<\/span>\n            <\/button>\n          <\/div>\n        <\/section>\n        <\/sc-if>\n      <\/aside>\n\n    <\/div>\n  <\/main>\n  <\/sc-if>\n\n  <!-- ===== SCREEN: CRITICAL ALERT ===== -->\n  <sc-if value=\"{{ isAlert }}\" hint-placeholder-val=\"{{ false }}\">\n  <main id=\"lc-main\" tabindex=\"-1\" aria-label=\"Critical alert \u2014 action required\" style=\"animation:lc-fade .18s ease;max-width:820px;margin:0 auto;padding:{{ mainPad }};\">\n    <button onclick=\"{{ goDashboard }}\" aria-label=\"Back to dashboard\" style=\"background:#EEF7F2;border:1px solid #BFE3D2;color:#157A58;font-size:15px;font-weight:600;padding:0 16px;margin-bottom:14px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;min-height:44px;\" style-hover=\"background:#DDF0E6;\" style-active=\"filter:brightness(0.95);\">\u2190 Back to dashboard<\/button>\n\n    <div style=\"background:#fff;border:2px solid #E24B4A;border-radius:12px;overflow:hidden;\" role=\"region\" aria-label=\"Critical hyperkalemia alert for James Kowalski\">\n      <div style=\"background:#FBE7E7;padding:14px 18px;border-bottom:0.5px solid #F3C9C9;display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n        <div aria-hidden=\"true\" style=\"width:34px;height:34px;border-radius:9px;background:#E24B4A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto;\">\u25b2<\/div>\n        <div>\n          <div style=\"font-size:12.5px;font-weight:500;color:#C0322F;letter-spacing:0.04em;text-transform:uppercase;\">Critical lab result<\/div>\n          <h1 style=\"margin:2px 0 0;font-size:18px;font-weight:500;\">Critical hyperkalemia \u2014 action required<\/h1>\n        <\/div>\n      <\/div>\n      <div style=\"padding:18px;\">\n        <!-- Patient + result cards \u2014 responsive: side-by-side or stacked on mobile -->\n        <div style=\"{{ alertCardsStyle }}\">\n          <div style=\"flex:1;min-width:0;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:10px;padding:12px 14px;\">\n            <div style=\"font-size:13px;color:#6B6A64;margin-bottom:6px;\">Patient<\/div>\n            <div style=\"font-size:16.5px;font-weight:500;\">James Kowalski<\/div>\n            <div style=\"font-size:13.5px;color:#6B6A64;margin-top:2px;\">58 M \u00b7 MRN 4471902 \u00b7 DOB 03\/14\/1968<\/div>\n            <div style=\"font-size:13.5px;color:#6B6A64;margin-top:2px;\">CKD stage 3 \u00b7 HTN \u00b7 on lisinopril, spironolactone<\/div>\n          <
