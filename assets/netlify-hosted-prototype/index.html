ing:10px;display:flex;gap:10px;align-items:flex-start;\">\n              <button onclick=\"{{ sd.toggle }}\" aria-pressed=\"{{ sd.checked }}\" aria-label=\"{{ sd.aria }}\" style=\"width:26px;height:26px;border-radius:6px;border:1.5px solid {{ sd.boxBorder }};background:{{ sd.boxBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;flex:0 0 auto;margin-top:1px;\">{{ sd.check }}<\/button>\n              <div style=\"flex:1;\">\n                <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap;\">\n                  <span aria-hidden=\"true\" style=\"width:8px;height:8px;border-radius:50%;background:{{ sd.dot }};flex:0 0 auto;\"><\/span>\n                  <span style=\"font-size:14.5px;font-weight:500;\">{{ sd.title }}<\/span>\n                  <span style=\"margin-left:auto;font-size:11.5px;color:{{ sd.sevColor }};background:{{ sd.sevBg }};border-radius:4px;padding:1px 6px;font-weight:500;\">{{ sd.severity }}<\/span>\n                <\/div>\n                <div style=\"font-size:13px;color:#6B6A64;\">{{ sd.detail }}<\/div>\n                <div style=\"margin-top:5px;font-size:13px;color:#1D9E75;font-weight:500;\">{{ sd.actionLabel }}<\/div>\n              <\/div>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <sc-if value=\"{{ sdohError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div role=\"alert\" aria-live=\"assertive\" style=\"margin-top:10px;font-size:13px;color:#C0322F;background:#FBE7E7;border:0.5px solid #E24B4A;border-radius:7px;padding:8px 10px;\">Select at least one action before submitting.<\/div>\n        <\/sc-if>\n        <button onclick=\"{{ submitSdoh }}\" style=\"margin-top:11px;width:100%;height:44px;border-radius:8px;border:none;background:{{ sdohSubmitBg }};color:#fff;font-size:14px;font-weight:500;\">{{ sdohSubmitLabel }}<\/button>\n        <button onclick=\"{{ toastRescreen }}\" aria-label=\"Re-screen SDOH \u2014 explains what the questionnaire covers\" style=\"margin-top:8px;width:100%;height:44px;border-radius:8px;border:0.5px solid #E2E1DA;background:#fff;font-size:14px;color:#6B6A64;display:flex;align-items:center;justify-content:center;gap:6px;\">\n          Re-screen SDOH\n          <span aria-hidden=\"true\" style=\"width:16px;height:16px;border-radius:50%;background:#EEF0F2;color:#3A4A58;font-size:12px;font-style:italic;display:inline-flex;align-items:center;justify-content:center;\">i<\/span>\n        <\/button>\n      <\/section>\n    <\/div>\n\n    <!-- Visit agenda -->\n    <section aria-labelledby=\"agenda-heading\" style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:16px 18px;margin-top:14px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px;\">\n        <h2 id=\"agenda-heading\" style=\"margin:0;font-size:15.5px;font-weight:500;\">AI-suggested visit agenda<\/h2>\n        <span style=\"font-size:13px;color:#6B6A64;\" aria-live=\"polite\">{{ agendaCount }} of 5 addressed \u00b7 checks pre-fill the note<\/span>\n      <\/div>\n      <div style=\"font-size:13px;color:#6B6A64;margin-bottom:12px;\">Pulled from overdue screenings and active SDOH flags. Open \"Why?\" for the guideline source.<\/div>\n      <div role=\"list\" style=\"display:flex;flex-direction:column;gap:8px;\">\n        <sc-for list=\"{{ agenda }}\" as=\"g\" hint-placeholder-count=\"5\">\n          <div role=\"listitem\" style=\"border:0.5px solid #E2E1DA;border-radius:10px;overflow:hidden;\">\n            <div style=\"display:flex;align-items:center;gap:11px;padding:11px 13px;\">\n              <button onclick=\"{{ g.toggle }}\" aria-pressed=\"{{ g.checked }}\" aria-label=\"{{ g.aria }}\" style=\"width:44px;height:44px;border-radius:6px;border:1.5px solid {{ g.boxBorder }};background:{{ g.boxBg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;flex:0 0 auto;\">{{ g.check }}<\/button>\n              <div style=\"flex:1;font-size:15px;color:{{ g.textColor }};text-decoration:{{ g.strike }};\">{{ g.label }}<\/div>\n              <button onclick=\"{{ g.why }}\" aria-expanded=\"{{ g.open }}\" aria-label=\"Why is this agenda item recommended?\" style=\"font-size:13px;color:#534AB7;background:#EEEDF8;border:none;border-radius:6px;padding:8px 9px;font-weight:500;min-height:44px;\">Why?<\/button>\n            <\/div>\n            <sc-if value=\"{{ g.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 13px 12px 58px;font-size:13.5px;color:#534AB7;line-height:1.45;\">\n                <span style=\"background:#EEEDF8;border-radius:4px;padding:1px 6px;font-weight:500;font-size:12.5px;\">{{ g.source }}<\/span> {{ g.rationale }}\n              <\/div>\n            <\/sc-if>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n      <button onclick=\"{{ startVisit }}\" style=\"margin-top:16px;width:100%;height:52px;border-radius:10px;border:none;background:#378ADD;color:#fff;font-size:15.5px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;\" style-hover=\"background:#2f78c4;\">\n        <span aria-hidden=\"true\">\u25cf<\/span> Start visit + enable ambient capture\n      <\/button>\n    <\/section>\n  <\/main>\n  <\/sc-if>\n\n  <!-- ===== SCREEN: SOAP EDITOR ===== -->\n  <sc-if value=\"{{ isSoap }}\" hint-placeholder-val=\"{{ false }}\">\n  <main id=\"lc-main\" tabindex=\"-1\" aria-label=\"SOAP note editor \u2014 Carol Bennett\" style=\"animation:lc-fade .18s ease;max-width:980px;margin:0 auto;padding:{{ mainPad }};\">\n    <button onclick=\"{{ goSnapshot }}\" aria-label=\"Back to Carol Bennett's AI snapshot\" style=\"background:#EEEDF8;border:1px solid #CBC7EC;color:#473e9e;font-size:15px;font-weight:600;padding:0 16px;margin-bottom:12px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;min-height:44px;\" style-hover=\"background:#E2E0F5;\" style-active=\"filter:brightness(0.95);\">\u2190 Back to AI snapshot<\/button>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;\">\n      <div>\n        <div style=\"font-size:14.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#534AB7;\">Documentation \u00b7 SOAP note<\/div>\n        <h1 style=\"margin:3px 0 0;font-size:23px;font-weight:500;\">Carol Bennett \u00b7 progress note \u00b7 Jun 26, 9:14 AM<\/h1>\n        <div style=\"font-size:13.5px;color:#6B6A64;margin-top:2px;\">Authored by <strong>Dr. Laura Mitchell<\/strong>, Internal Medicine<\/div>\n      <\/div>\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap;\">\n        <span role=\"status\" aria-live=\"polite\" style=\"display:inline-flex;align-items:center;gap:6px;font-size:13.5px;color:#157A58;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:8px;padding:6px 10px;\">\n          <span aria-hidden=\"true\" style=\"width:7px;height:7px;border-radius:50%;background:#1D9E75;\"><\/span>Ambient capture complete\n        <\/span>\n        <button onclick=\"{{ toggleTranscript }}\" aria-expanded=\"{{ transcriptOpen }}\" aria-controls=\"lc-transcript\" style=\"font-size:14px;border:0.5px solid #E2E1DA;background:#fff;border-radius:8px;padding:8px 11px;min-height:44px;\">{{ transcriptLabel }}<\/button>\n      <\/div>\n    <\/div>\n\n    <!-- ===== PERSISTENT VISIT CONTEXT (sticky) =====\n         Keeps patient identity + visit progress visible while scrolling through\n         a long SOAP note, so context isn't lost when reviewing section by section.\n         top:64px approximates the sticky header's min-height; on very narrow\n         screens where the header wraps to 2 lines this may sit slightly high \u2014\n         an acceptable prototype-level tradeoff matching the rest of the file's\n         responsive approach. -->\n    <div role=\"region\" aria-label=\"Visit context summary\" style=\"position:sticky;top:64px;z-index:30;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px;color:#6B6A64;\">\n      <span style=\"font-weight:600;color:#2A2A28;\">Carol Bennett<\/span>\n      <span aria-hidden=\"true\">\u00b7<\/span>\n      <span>67 F \u00b7 Chronic care follow-up<\/span>\n      <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n      <span>{{ agendaCount }} of 5 agenda items reviewed<\/span>\n      <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n      <span>{{ sdohSelectedCount }} of 3 SDOH actions selected<\/span>\n      <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n      <span aria-live=\"polite\">{{ acceptedCount }} of 4 SOAP sections reviewed<\/span>\n    <\/div>\n\n    <!-- Transcript panel -->\n    <sc-if value=\"{{ transcriptOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div id=\"lc-transcript\" style=\"overflow:hidden;animation:lc-slide .22s ease;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:10px;padding:13px 15px;margin-bottom:14px;\" role=\"region\" aria-label=\"Ambient transcript excerpt\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;\">\n          <span style=\"font-size:13.5px;font-weight:500;\">Ambient transcript<\/span>\n          <button onclick=\"{{ toastTranscript }}\" style=\"font-size:13px;color:#378ADD;background:none;border:none;padding:6px;min-height:44px;\">View full<\/button>\n        <\/div>\n        <div role=\"log\" aria-label=\"Conversation transcript\" style=\"display:flex;flex-direction:column;gap:7px;font-size:14px;line-height:1.4;\">\n          <div style=\"display:flex;gap:10px;\"><span aria-label=\"09:01\" style=\"color:#6B6A64;width:42px;flex:0 0 auto;\">09:01<\/span><span aria-label=\"Doctor\" style=\"color:#534AB7;font-weight:500;width:26px;flex:0 0 auto;\">DR<\/span><span>How have you been feeling since the last visit?<\/span><\/div>\n          <div style=\"display:flex;gap:10px;\"><span aria-label=\"09:01\" style=\"color:#6B6A64;width:42px;flex:0 0 auto;\">09:01<\/span><span aria-label=\"Patient\" style=\"color:#1D9E75;font-weight:500;width:26px;flex:0 0 auto;\">PT<\/span><span>More tired than usual. And honestly the fresh food is hard \u2014 I've been eating mostly from cans.<\/span><\/div>\n          <div style=\"display:flex;gap:10px;\"><span aria-label=\"09:02\" style=\"color:#6B6A64;width:42px;flex:0 0 auto;\">09:02<\/span><span aria-label=\"Doctor\" style=\"color:#534AB7;font-weight:500;width:26px;flex:0 0 auto;\">DR<\/span><span>Your A1c actually came down to 7.2. Are you taking the metformin twice a day?<\/span><\/div>\n          <div style=\"display:flex;gap:10px;\"><span aria-label=\"09:02\" style=\"color:#6B6A64;width:42px;flex:0 0 auto;\">09:02<\/span><span aria-label=\"Patient\" style=\"color:#1D9E75;font-weight:500;width:26px;flex:0 0 auto;\">PT<\/span><span>Yes, with breakfast and dinner. I have about a week left.<\/span><\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <!-- AI banner -->\n    <div role=\"note\" aria-label=\"AI draft notice \u2014 amber text is AI-generated and must be reviewed\" style=\"background:#EAF3FB;border:0.5px solid #BBD9F2;border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;\">\n      <span aria-hidden=\"true\" style=\"width:22px;height:22px;border-radius:50%;background:#378ADD;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;font-style:italic;flex:0 0 auto;\">i<\/span>\n      <div style=\"flex:1;font-size:14px;color:#2A6196;\">AI draft from ambient capture. <span style=\"background:#FAEEDA;border-radius:4px;padding:0 4px;color:#9A6B14;\">Amber<\/span> = AI-generated text \u2014 review before accepting.<\/div>\n      <button onclick=\"{{ acceptAll }}\" aria-label=\"Accept all four SOAP sections\" style=\"font-size:13.5px;font-weight:500;color:#fff;background:#378ADD;border:none;border-radius:7px;padding:9px 12px;min-height:44px;\" style-hover=\"background:#2f78c4;\">Accept all<\/button>\n    <\/div>\n\n    <!-- English AVS confirmation -->\n    <div role=\"note\" aria-label=\"After-visit summary language confirmation\" style=\"background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:9px;margin-bottom:14px;\">\n      <span aria-hidden=\"true\" style=\"width:20px;height:20px;border-radius:50%;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;flex:0 0 auto;\">\u2713<\/span>\n      <div style=\"font-size:14px;color:#157A58;\">This note and Carol Bennett's after-visit summary will both remain in <strong>English<\/strong> \u2014 her preferred language.<\/div>\n    <\/div>\n\n    <!-- Language controls -->\n    <div role=\"group\" aria-label=\"Language and tone settings\" style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:#fff;border:0.5px solid #E2E1DA;border-radius:10px;padding:11px 14px;margin-bottom:14px;\">\n      <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"font-size:13.5px;color:#6B6A64;\">Note language<\/span><span style=\"font-size:13.5px;font-weight:500;border:0.5px solid #E2E1DA;border-radius:7px;padding:4px 9px;\" aria-label=\"English\">EN<\/span><\/div>\n      <div aria-hidden=\"true\" style=\"width:0.5px;height:20px;background:#E2E1DA;\"><\/div>\n      <div style=\"display:flex;align-items:center;gap:7px;\"><span style=\"font-size:13.5px;color:#6B6A64;\">After-visit summary<\/span><span aria-label=\"English, matches patient preference\" style=\"font-size:13.5px;font-weight:500;color:#157A58;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:7px;padding:4px 9px;\">EN \u00b7 from patient pref<\/span><\/div>\n      <div aria-hidden=\"true\" style=\"width:0.5px;height:20px;background:#E2E1DA;\"><\/div>\n      <div style=\"display:flex;align-items:center;gap:7px;\">\n        <span style=\"font-size:13.5px;color:#6B6A64;\">Tone<\/span><span style=\"font-size:13.5px;font-weight:500;border:0.5px solid #E2E1DA;border-radius:7px;padding:4px 9px;\">Standard<\/span>\n        <button onclick=\"{{ toastTone }}\" aria-label=\"What does the Standard tone setting mean?\" style=\"width:20px;height:20px;border-radius:50%;background:#EEF0F2;color:#3A4A58;border:none;font-size:12.5px;font-style:italic;display:inline-flex;align-items:center;justify-content:center;\">i<\/button>\n      <\/div>\n      <span role=\"note\" style=\"margin-left:auto;font-size:12.5px;color:#157A58;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:6px;padding:3px 8px;\">Note and summary both in English \u2014 no translation needed<\/span>\n    <\/div>\n\n    <!-- NEW: persistent remaining-sections indicator \u2014 visible at all times,\n         not just after a failed sign attempt, so progress is always legible. -->\n    <div style=\"display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px;\">\n      <span role=\"status\" aria-live=\"polite\" style=\"font-size:13px;font-weight:500;color:{{ remainingColor }};\">{{ remainingLabel }}<\/span>\n    <\/div>\n\n    <!-- SOAP sections -->\n    <div role=\"list\" aria-label=\"SOAP note sections\" style=\"display:flex;flex-direction:column;gap:10px;\">\n      <sc-for list=\"{{ soapSections }}\" as=\"sec\" hint-placeholder-count=\"4\">\n        <article role=\"listitem\" aria-label=\"{{ sec.title }} section \u2014 {{ sec.badge }}\" style=\"background:#fff;border:0.5px solid {{ sec.cardBorder }};border-left:3px solid {{ sec.edge }};border-radius:12px;padding:14px 16px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap;\">\n            <span aria-hidden=\"true\" style=\"width:24px;height:24px;border-radius:7px;background:#F0EFEA;color:#6B6A64;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:500;flex:0 0 auto;\">{{ sec.letter }}<\/span>\n            <h2 style=\"margin:0;font-size:15px;font-weight:500;\">{{ sec.title }}<\/h2>\n            <span style=\"font-size:12px;font-weight:500;color:{{ sec.badgeColor }};background:{{ sec.badgeBg }};border-radius:5px;padding:2px 7px;\">{{ sec.badge }}<\/span>\n            <div aria-hidden=\"true\" style=\"flex:1;\"><\/div>\n            <!-- POLISH: pencil-only icon replaced with a labeled pill \u2014 bare glyph\n                 buttons tested poorly for discoverability in the moderated session. -->\n            <button onclick=\"{{ toastEdit }}\" aria-label=\"Edit {{ sec.title }} section\" style=\"font-size:13.5px;font-weight:500;color:#3A4A58;background:#EEF0F2;border:0.5px solid #D7DCE0;border-radius:7px;padding:8px 12px;min-height:44px;display:inline-flex;align-items:center;gap:5px;\" style-hover=\"background:#E2E7EA;\">\n              <span aria-hidden=\"true\" style=\"font-size:14px;\">\u270e<\/span><span>Edit<\/span>\n            <\/button>\n            <sc-if value=\"{{ sec.notAccepted }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ sec.accept }}\" aria-label=\"{{ sec.acceptAriaLabel }}\" style=\"font-size:13.5px;font-weight:500;color:#fff;background:#1D9E75;border:none;border-radius:7px;padding:10px 13px;min-height:44px;\" style-hover=\"background:#188862;\">Accept<\/button>\n            <\/sc-if>\n            <!-- NEW: Unaccept \/ Re-review \u2014 reopens an already-accepted section,\n                 restoring its amber highlighting until re-accepted. -->\n            <sc-if value=\"{{ sec.sectionAccepted }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ sec.unaccept }}\" aria-label=\"Reopen {{ sec.title }} for re-review \u2014 restores AI highlighting\" style=\"font-size:13px;font-weight:500;color:#6B6A64;background:none;border:0.5px solid #E2E1DA;border-radius:7px;padding:9px 12px;min-height:44px;\" style-hover=\"background:#F5F5F0;\">\u21ba Re-review<\/button>\n            <\/sc-if>\n          <\/div>\n          <div style=\"font-size:14.5px;line-height:1.5;color:#3A3A36;\">\n            <sc-for list=\"{{ sec.lines }}\" as=\"ln\" hint-placeholder-count=\"2\">\n              <div style=\"background:{{ ln.bg }};border-radius:4px;padding:1px 4px;margin:2px 0;display:inline-block;\">{{ ln.text }}<\/div>\n            <\/sc-for>\n          <\/div>\n        <\/article>\n      <\/sc-for>\n    <\/div>\n\n    <!-- Orders -->\n    <section aria-labelledby=\"orders-heading\" style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:12px;padding:14px 16px;margin-top:12px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap;\">\n        <h2 id=\"orders-heading\" style=\"margin:0;font-size:15px;font-weight:500;\">Orders<\/h2>\n        <span style=\"font-size:12px;font-weight:500;color:#2A6196;background:#EAF3FB;border-radius:5px;padding:2px 7px;\">AI suggestions<\/span>\n        <div aria-hidden=\"true\" style=\"flex:1;\"><\/div>\n        <button onclick=\"{{ toastAddOrder }}\" style=\"font-size:13.5px;color:#1D9E75;background:none;border:0.5px solid #BFE3D2;border-radius:7px;padding:9px 11px;font-weight:500;min-height:44px;\">+ Add order<\/button>\n      <\/div>\n      <div role=\"list\" style=\"display:flex;flex-direction:column;gap:7px;font-size:14.5px;\">\n        <div role=\"listitem\" style=\"display:flex;align-items:center;gap:9px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\uff0b<\/span>Metformin 1000 mg \u2014 refill \u00d790 days<\/div>\n        <div role=\"listitem\" style=\"display:flex;align-items:center;gap:9px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\uff0b<\/span>HbA1c \u2014 recheck in 3 months<\/div>\n        <div role=\"listitem\" style=\"display:flex;align-items:center;gap:9px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\uff0b<\/span>Community food bank referral <span style=\"font-size:12px;color:#9A6B14;background:#FAEEDA;border-radius:4px;padding:1px 6px;\">from SDOH<\/span><\/div>\n      <\/div>\n    <\/section>\n\n    <sc-if value=\"{{ soapError }}\" hint-placeholder-val=\"{{ false }}\">\n      <div role=\"alert\" aria-live=\"assertive\" style=\"margin-top:14px;background:#FBE7E7;border:0.5px solid #E24B4A;border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;animation:lc-pop .16s ease;\">\n        <span aria-hidden=\"true\" style=\"color:#E24B4A;font-size:15.5px;\">\u25b2<\/span>\n        <div><div style=\"font-size:14.5px;font-weight:500;color:#C0322F;\">Accept every section before signing<\/div><div style=\"font-size:13.5px;color:#6B6A64;margin-top:2px;\">{{ soapErrorDetail }}<\/div><\/div>\n      <\/div>\n    <\/sc-if>\n\n    <div style=\"display:flex;align-items:center;gap:12px;justify-content:space-between;margin-top:18px;flex-wrap:wrap;\">\n      <span style=\"font-size:13px;color:#6B6A64;\">You'll sign as <strong>Dr. Laura Mitchell<\/strong> on the next screen.<\/span>\n      <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n        <span style=\"font-size:13.5px;color:#6B6A64;\" aria-live=\"polite\">{{ acceptedCount }} of 4 sections reviewed<\/span>\n        <button onclick=\"{{ attemptSoapSign }}\" aria-disabled=\"{{ signLocked }}\" style=\"{{ soapSignStyle }}\">{{ soapSignLabel }}<\/button>\n      <\/div>\n    <\/div>\n  <\/main>\n  <\/sc-if>\n\n  <!-- ===== SCREEN: PRE-SIGN \/ SUCCESS ===== -->\n  <sc-if value=\"{{ isPresign }}\" hint-placeholder-val=\"{{ false }}\">\n  <main id=\"lc-main\" tabindex=\"-1\" aria-label=\"{{ presignAriaLabel }}\" style=\"animation:lc-fade .18s ease;max-width:720px;margin:0 auto;padding:{{ mainPad }};\">\n\n    <sc-if value=\"{{ signed }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"animation:lc-pop .2s ease;\" role=\"region\" aria-label=\"Note signed successfully\">\n        <div style=\"background:#fff;border:0.5px solid #BFE3D2;border-radius:14px;overflow:hidden;\">\n          <div style=\"background:#EEF7F2;padding:20px;display:flex;align-items:center;gap:14px;border-bottom:0.5px solid #BFE3D2;flex-wrap:wrap;\">\n            <div aria-hidden=\"true\" style=\"width:42px;height:42px;border-radius:50%;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;font-size:23px;flex:0 0 auto;\">\u2713<\/div>\n            <div><div style=\"font-size:19px;font-weight:500;\">Note signed &amp; written back<\/div><div style=\"font-size:14px;color:#6B6A64;margin-top:2px;\">FHIR write-back complete \u00b7 9:21 AM \u00b7 audit logged<\/div><\/div>\n          <\/div>\n          <div style=\"padding:18px;\">\n            <div style=\"font-size:14px;font-weight:500;margin-bottom:10px;\">Orders released<\/div>\n            <div role=\"list\" style=\"display:flex;flex-direction:column;gap:8px;\">\n              <div role=\"listitem\" style=\"display:flex;align-items:center;gap:10px;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:9px;padding:10px 12px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\u2713<\/span><span style=\"font-size:14.5px;flex:1;\">Metformin refill \u00d790d<\/span><span style=\"font-size:12.5px;color:#157A58;\">sent to pharmacy<\/span><\/div>\n              <div role=\"listitem\" style=\"display:flex;align-items:center;gap:10px;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:9px;padding:10px 12px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\u2713<\/span><span style=\"font-size:14.5px;flex:1;\">HbA1c in 3 months<\/span><span style=\"font-size:12.5px;color:#157A58;\">lab order placed<\/span><\/div>\n              <div role=\"listitem\" style=\"display:flex;align-items:center;gap:10px;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:9px;padding:10px 12px;\"><span aria-hidden=\"true\" style=\"color:#1D9E75;\">\u2713<\/span><span style=\"font-size:14.5px;flex:1;\">Community food bank referral<\/span><span style=\"font-size:12.5px;color:#157A58;\">referral sent<\/span><\/div>\n            <\/div>\n            <button onclick=\"{{ toastSpanish }}\" style=\"margin-top:14px;width:100%;height:52px;border-radius:10px;border:none;background:#534AB7;color:#fff;font-size:15px;font-weight:500;\" style-hover=\"background:#473e9e;\">Send English after-visit summary to patient<\/button>\n            <button onclick=\"{{ restart }}\" style=\"margin-top:9px;width:100%;height:48px;border-radius:10px;border:0.5px solid #E2E1DA;background:#fff;font-size:14.5px;color:#6B6A64;\">Restart prototype from dashboard<\/button>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/sc-if>\n\n    <sc-if value=\"{{ notSigned }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onclick=\"{{ goSoap }}\" aria-label=\"Back to note editor\" style=\"background:#EEF7F2;border:1px solid #BFE3D2;color:#157A58;font-size:15px;font-weight:600;padding:0 16px;margin-bottom:14px;border-radius:9px;display:inline-flex;align-items:center;gap:6px;min-height:44px;\" style-hover=\"background:#DDF0E6;\" style-active=\"filter:brightness(0.95);\">\u2190 Back to note<\/button>\n\n      <!-- ===== PERSISTENT VISIT CONTEXT (sticky) \u2014 same summary as the SOAP\n           screen, so context carries through to the final signing step. ===== -->\n      <div role=\"region\" aria-label=\"Visit context summary\" style=\"position:sticky;top:64px;z-index:30;background:#FAFAF7;border:0.5px solid #E2E1DA;border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:13px;color:#6B6A64;\">\n        <span style=\"font-weight:600;color:#2A2A28;\">Carol Bennett<\/span>\n        <span aria-hidden=\"true\">\u00b7<\/span>\n        <span>67 F \u00b7 Chronic care follow-up<\/span>\n        <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n        <span>{{ agendaCount }} of 5 agenda items reviewed<\/span>\n        <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n        <span>{{ sdohSelectedCount }} of 3 SDOH actions selected<\/span>\n        <span aria-hidden=\"true\" style=\"width:0.5px;height:14px;background:#E2E1DA;\"><\/span>\n        <span>{{ acceptedCount }} of 4 SOAP sections reviewed<\/span>\n      <\/div>\n\n      <div style=\"background:#fff;border:0.5px solid #E2E1DA;border-radius:14px;padding:20px;\">\n        <div style=\"font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#534AB7;margin-bottom:4px;\">Documentation \u00b7 Sign-off<\/div>\n        <h1 style=\"margin:0 0 4px;font-size:20px;font-weight:500;\">Confirm and sign<\/h1>\n        <div style=\"font-size:14px;color:#6B6A64;margin-bottom:16px;\">Carol Bennett \u00b7 progress note \u00b7 4 of 4 sections accepted<\/div>\n        <div role=\"note\" style=\"background:#FBF6EC;border:0.5px solid #EFD4A0;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:14px;color:#9A6B14;line-height:1.45;\">\n          Signing writes this note permanently to the patient record via FHIR. Signed notes are amendment-only and carry full legal weight \u2014 AI-assisted content you sign is your responsibility.\n        <\/div>\n        <!-- NEW: live acknowledgment counter \u2014 visible before any error occurs,\n             so the requirement is legible up front rather than only on failure. -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n          <span id=\"ack-group-label\" style=\"font-size:13px;font-weight:500;color:#6B6A64;\">Required acknowledgments<\/span>\n          <span aria-live=\"polite\" style=\"font-size:13px;font-weight:500;color:#6B6A64;\">{{ ackConfirmedCount }} of 2 confirmed<\/span>\n        <\/div>\n        <div role=\"group\" aria-labelledby=\"ack-group-label\" style=\"display:flex;flex-direction:column;gap:10px;\">\n          <button id=\"lc-ack1\" onclick=\"{{ toggleAck1 }}\" aria-pressed=\"{{ ack1 }}\" style=\"text-align:left;display:flex;gap:11px;align-items:flex-start;background:#fff;border:0.5px solid {{ ack1Border }};border-radius:10px;padding:13px 14px;min-height:54px;width:100%;\">\n            <span aria-hidden=\"true\" style=\"width:22px;height:22px;border-radius:6px;border:1.5px solid {{ ack1Border }};background:{{ ack1Bg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;flex:0 0 auto;\">{{ ack1Check }}<\/span>\n            <span style=\"font-size:14.5px;line-height:1.45;\">I have reviewed all sections and verified this note against the patient's presentation.<\/span>\n          <\/button>\n          <button id=\"lc-ack2\" onclick=\"{{ toggleAck2 }}\" aria-pressed=\"{{ ack2 }}\" style=\"text-align:left;display:flex;gap:11px;align-items:flex-start;background:#fff;border:0.5px solid {{ ack2Border }};border-radius:10px;padding:13px 14px;min-height:54px;width:100%;\">\n            <span aria-hidden=\"true\" style=\"width:22px;height:22px;border-radius:6px;border:1.5px solid {{ ack2Border }};background:{{ ack2Bg }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;flex:0 0 auto;\">{{ ack2Check }}<\/span>\n            <span style=\"font-size:14.5px;line-height:1.45;\">The orders listed above are accurate and intentional.<\/span>\n          <\/button>\n        <\/div>\n\n        <!-- Electronic signature -->\n        <div style=\"margin-top:16px;border:1px solid #E2E1DA;border-radius:10px;padding:14px 16px;background:#FAFAF7;\">\n          <div style=\"font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#6B6A64;margin-bottom:8px;\">Electronic signature<\/div>\n          <div style=\"font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:26px;color:#2A2A28;border-bottom:1.5px solid #2A2A28;padding-bottom:6px;display:inline-block;\">Laura Mitchell, MD<\/div>\n          <div style=\"font-size:13.5px;color:#6B6A64;margin-top:6px;\">Signing as <strong>Dr. Laura Mitchell<\/strong> \u00b7 Internal Medicine \u00b7 credentials verified<\/div>\n        <\/div>\n        <!-- IMPROVED PRE-SIGN GATE: error banner now names exactly which\n             acknowledgment(s) are missing (presignErrorDetail), instead of a\n             generic \"both are required\" message \u2014 mirrors the SOAP screen's\n             soapErrorDetail pattern. Combined with the per-checkbox red border\n             (ack1Border\/ack2Border) and the focus-on-error retry logic in\n             finalSign(), a failed attempt now visually and programmatically\n             points straight at what's left to do. -->\n        <sc-if value=\"{{ presignError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div role=\"alert\" aria-live=\"assertive\" style=\"margin-top:14px;background:#FBE7E7;border:0.5px solid #E24B4A;border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;animation:lc-pop .16s ease;\">\n            <span aria-hidden=\"true\" style=\"color:#E24B4A;font-size:15.5px;\">\u25b2<\/span>\n            <div><div style=\"font-size:14.5px;font-weight:500;color:#C0322F;\">Both acknowledgments are required<\/div><div style=\"font-size:13.5px;color:#6B6A64;margin-top:2px;\">{{ presignErrorDetail }}<\/div><\/div>\n          <\/div>\n        <\/sc-if>\n        <button onclick=\"{{ finalSign }}\" aria-disabled=\"{{ finalLocked }}\" style=\"{{ finalSignStyle }}\">{{ finalSignLabel }}<\/button>\n      <\/div>\n    <\/sc-if>\n  <\/main>\n  <\/sc-if>\n\n  <!-- ===== FOOTER =====\n       Global \u2014 renders at the bottom of every screen inside the scrolling page\n       frame (not fixed), the way a real product's footer would. Content is\n       what's typical for a clinical documentation \/ ambient-AI product:\n       compliance posture, legal links, support contact, and a standing\n       reminder that AI output requires clinician review \u2014 consistent with the\n       in-app \"Always verify\" messaging elsewhere. -->\n  <footer role=\"contentinfo\" style=\"border-top:0.5px solid #E2E1DA;margin-top:32px;\">\n    <div style=\"max-width:{{ headerMaxWidth }};margin:0 auto;padding:22px {{ headerPadX }} 28px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n          <div aria-hidden=\"true\" style=\"width:20px;height:20px;border-radius:6px;background:#1D9E75;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:12px;flex:0 0 auto;\">L<\/div>\n          <span style=\"font-size:13px;color:#6B6A64;\">\u00a9 2026 Lumen Chart, Inc. All rights reserved.<\/span>\n        <\/div>\n        <nav aria-label=\"Legal and support\" style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n          <span style=\"font-size:12px;color:#9A9990;\">HIPAA-compliant \u00b7 SOC 2 Type II<\/span>\n          <a href=\"#\" style=\"font-size:12.5px;color:#6B6A64;text-decoration:none;\">Privacy Policy<\/a>\n          <a href=\"#\" style=\"font-size:12.5px;color:#6B6A64;text-decoration:none;\">Terms of Service<\/a>\n          <a href=\"#\" style=\"font-size:12.5px;color:#6B6A64;text-decoration:none;\">Security<\/a>\n          <a href=\"#\" style=\"font-size:12.5px;color:#6B6A64;text-decoration:none;\">Support<\/a>\n          <span aria-hidden=\"true\" style=\"font-size:11.5px;color:#C4C3BB;\">v2.4.1<\/span>\n        <\/nav>\n      <\/div>\n      <p style=\"margin:12px 0 0;font-size:11.5px;line-height:1.5;color:#9A9990;\">\n        Lumen Chart is a clinical documentation aid. AI-generated content is provided for clinician review and must be verified against the source record before it becomes part of a signed note. Lumen Chart does not make diagnostic or treatment decisions and is not a substitute for clinical judgment.\n      <\/p>\n    <\/div>\n  <\/footer>\n\n  <!-- ===== ONBOARDING WIZARD (first-load only, localStorage-gated) =====\n       Directly addresses the moderated-test finding: users noticed the amber\n       highlighting and pencil icon but didn't understand their meaning without\n       prior exposure (\"It will be easier if I could use it before\"). -->\n  <sc-if value=\"{{ onboardingOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"onboarding-title\" style=\"position:fixed;inset:0;z-index:80;background:rgba(30,30,28,0.55);display:flex;align-items:center;justify-content:center;padding:20px;\">\n      <div style=\"background:#fff;border-radius:16px;max-width:440px;width:100%;padding:26px 26px 22px;animation:lc-pop .18s ease;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#534AB7;\">Quick tour \u00b7 {{ onboardingStepNum }} of {{ onboardingStepTotal }}<\/span>\n          <button onclick=\"{{ skipOnboarding }}\" aria-label=\"Skip tour\" style=\"font-size:13.5px;color:#6B6A64;background:none;border:none;padding:8px;min-height:44px;text-decoration:underline;flex:0 0 auto;\">Skip tour<\/button>\n        <\/div>\n        <h2 id=\"onboarding-title\" style=\"margin:0 0 8px;font-size:19px;font-weight:500;\">{{ onboardingTitle }}<\/h2>\n        <p style=\"margin:0 0 18px;font-size:14.5px;line-height:1.5;color:#4A4A46;\">{{ onboardingBody }}<\/p>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n          <div style=\"display:flex;gap:6px;\" aria-hidden=\"true\">\n            <sc-for list=\"{{ obDots }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ d.color }};display:inline-block;\"><\/span>\n            <\/sc-for>\n          <\/div>\n          <div style=\"display:flex;gap:8px;\">\n            <sc-if value=\"{{ onboardingShowBack }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ onboardingBack }}\" style=\"height:44px;padding:0 16px;border-radius:9px;border:0.5px solid #E2E1DA;background:#fff;color:#2A2A28;font-size:14.5px;\" style-hover=\"background:#F5F5F0;\">Back<\/button>\n            <\/sc-if>\n            <button onclick=\"{{ onboardingNext }}\" style=\"height:44px;padding:0 20px;border-radius:9px;border:none;background:#534AB7;color:#fff;font-size:14.5px;font-weight:500;\" style-hover=\"background:#473e9e;\">{{ onboardingNextLabel }}<\/button>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ===== FLOW & NOTES OVERLAY ===== -->\n  <sc-if value=\"{{ showFlow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ toggleFlow }}\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"flow-title\" style=\"position:fixed;inset:0;z-index:60;background:rgba(30,30,28,0.45);display:flex;align-items:flex-start;justify-content:center;padding:{{ flowOverlayPad }};overflow:auto;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:14px;max-width:920px;width:100%;padding:{{ flowInnerPad }};animation:lc-pop .18s ease;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\">\n          <h2 id=\"flow-title\" style=\"margin:0;font-size:19px;font-weight:500;\">Prototype flow &amp; design notes<\/h2>\n          <button onclick=\"{{ toggleFlow }}\" aria-label=\"Close flow diagram\" style=\"width:44px;height:44px;border-radius:8px;border:0.5px solid #E2E1DA;background:#fff;font-size:16.5px;display:flex;align-items:center;justify-content:center;\">\u2715<\/button>\n        <\/div>\n        <div style=\"font-size:14px;color:#888780;margin-bottom:18px;\">Priority 1 \u2014 core clinician flow \u00b7 Dr. Laura Mitchell<\/div>\n        <div style=\"overflow-x:auto;padding-bottom:6px;margin-bottom:20px;\" role=\"img\" aria-label=\"Flow diagram: Dashboard \u2192 Critical alert \u2192 AI snapshot \u2192 SOAP editor \u2192 Sign and success\">\n          <div style=\"display:flex;align-items:center;gap:0;min-width:840px;\">\n            <div style=\"text-align:center;\"><div style=\"width:120px;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:9px;padding:10px 8px;font-size:13px;font-weight:500;color:#157A58;\">1 \u00b7 Dashboard<\/div><div style=\"font-size:11.5px;color:#888780;margin-top:4px;\">queue + alerts<\/div><\/div>\n            <div aria-hidden=\"true\" style=\"color:#C4C3BB;padding:0 6px 18px;font-size:18px;\">\u2192<\/div>\n            <div style=\"text-align:center;\"><div style=\"width:120px;background:#FBE7E7;border:0.5px solid #F3C9C9;border-radius:9px;padding:10px 8px;font-size:13px;font-weight:500;color:#C0322F;\">2 \u00b7 Critical alert<\/div><div style=\"font-size:11.5px;color:#E24B4A;margin-top:4px;\">\u25c6 branch \u00b7 error<\/div><\/div>\n            <div aria-hidden=\"true\" style=\"color:#C4C3BB;padding:0 6px 18px;font-size:18px;\">\u2192<\/div>\n            <div style=\"text-align:center;\"><div style=\"width:120px;background:#EAF3FB;border:0.5px solid #BBD9F2;border-radius:9px;padding:10px 8px;font-size:13px;font-weight:500;color:#2A6196;\">3 \u00b7 AI snapshot<\/div><div style=\"font-size:11.5px;color:#888780;margin-top:4px;\">SDOH + agenda<\/div><\/div>\n            <div aria-hidden=\"true\" style=\"color:#C4C3BB;padding:0 6px 18px;font-size:18px;\">\u2192<\/div>\n            <div style=\"text-align:center;\"><div style=\"width:120px;background:#EEEDF8;border:0.5px solid #CBC7EC;border-radius:9px;padding:10px 8px;font-size:13px;font-weight:500;color:#473e9e;\">4 \u00b7 SOAP editor<\/div><div style=\"font-size:11.5px;color:#473e9e;margin-top:4px;\">\u25c6 sign gate \u00b7 error<\/div><\/div>\n            <div aria-hidden=\"true\" style=\"color:#C4C3BB;padding:0 6px 18px;font-size:18px;\">\u2192<\/div>\n            <div style=\"text-align:center;\"><div style=\"width:120px;background:#EEF7F2;border:0.5px solid #BFE3D2;border-radius:9px;padding:10px 8px;font-size:13px;font-weight:500;color:#157A58;\">5 \u00b7 Sign + success<\/div><div style=\"font-size:11.5px;color:#157A58;margin-top:4px;\">\u25c6 two-gate \u00b7 FHIR<\/div><\/div>\n          <\/div>\n        <\/div>\n        <div style=\"display:grid;grid-template-columns:{{ flowNotesCols }};gap:18px;\">\n          <div>\n            <h3 style=\"margin:0 0 6px;font-size:14.5px;font-weight:500;\">Goals<\/h3>\n            <ul style=\"margin:0;padding-left:16px;font-size:14px;color:#4A4A46;line-height:1.55;\">\n              <li>Cut pre-visit synthesis to under 60s with a single AI snapshot instead of multi-tab hunting.<\/li>\n              <li>Make AI-generated text unmistakable from verified chart data (amber diff).<\/li>\n              <li>Gate signing behind deliberate, per-section review \u2014 never one-click.<\/li>\n              <li>Surface SDOH and critical alerts before a chart is ever opened.<\/li>\n            <\/ul>\n            <h3 style=\"margin:16px 0 6px;font-size:14.5px;font-weight:500;\">Constraints<\/h3>\n            <ul style=\"margin:0;padding-left:16px;font-size:14px;color:#4A4A46;line-height:1.55;\">\n              <li>FHIR write-back to Epic\/Cerner; signed notes are amendment-only.<\/li>\n              <li>HIPAA audit logging on every chart open and signature.<\/li>\n              <li>Ambient capture requires prior patient consent.<\/li>\n              <li>Color is never the sole signal \u2014 icons + labels accompany every state.<\/li>\n            <\/ul>\n          <\/div>\n          <div>\n            <h3 style=\"margin:0 0 6px;font-size:14.5px;font-weight:500;\">Decision points &amp; error states<\/h3>\n            <ul style=\"margin:0;padding-left:16px;font-size:14px;color:#4A4A46;line-height:1.55;\">\n              <li><b>Branch 1 \u2014 critical alert:<\/b> three required-action paths. Acknowledging with no action \u2192 safety error.<\/li>\n              <li><b>Branch 2 \u2014 sign gate:<\/b> sign before all SOAP sections accepted \u2192 error naming missing sections.<\/li>\n              <li><b>Branch 3 \u2014 two-gate confirm:<\/b> both acknowledgments required or error.<\/li>\n            <\/ul>\n            <h3 style=\"margin:16px 0 6px;font-size:14.5px;font-weight:500;\">Microinteractions<\/h3>\n            <ul style=\"margin:0;padding-left:16px;font-size:14px;color:#4A4A46;line-height:1.55;\">\n              <li>Fade-in on every screen; toast system (success \/ info \/ warning \/ danger).<\/li>\n              <li>900ms ambient-capture delay, 1200ms FHIR write-back delay.<\/li>\n              <li>Clinic-status toggle, transcript slide reveal, \"Why?\" expand, accept-clears-amber.<\/li>\n            <\/ul>\n          <\/div>\n        <\/div>\n        <div style=\"margin-top:16px;font-size:13px;color:#888780;line-height:1.5;border-top:0.5px solid #E2E1DA;padding-top:12px;\">Simulated vs. functional: all navigation, branching, error gates, toggles and timed delays are functional. Lab values, transcript, and orders are realistic sample data. Rows outside the core flow surface a scope toast.<\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ===== TOAST CONTAINER \u2014 responsive: corner on desktop, full-width strip on mobile ===== -->\n  <div aria-live=\"polite\" aria-atomic=\"false\" aria-label=\"Notifications\" style=\"{{ toastContainerStyle }}\">\n    <sc-for list=\"{{ toasts }}\" as=\"t\" hint-placeholder-count=\"0\">\n      <div role=\"status\" style=\"animation:lc-toast .2s ease;background:#fff;border:0.5px solid {{ t.border }};border-left:4px solid {{ t.accent }};border-radius:12px;padding:15px 17px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 8px 24px rgba(40,40,36,0.14);\">\n        <span aria-hidden=\"true\" style=\"width:26px;height:26px;border-radius:50%;background:{{ t.accent }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:14.5px;flex:0 0 auto;margin-top:1px;\">{{ t.icon }}<\/span>\n        <div><div style=\"font-size:16px;font-weight:600;\">{{ t.title }}<\/div><div style=\"font-size:14.5px;color:#6B6A64;line-height:1.4;margin-top:2px;\">{{ t.msg }}<\/div><\/div>\n      <\/div>\n    <\/sc-for>\n  <\/div>\n\n<\/div>\n\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\">\n\n\/\/ === Onboarding wizard content \u2014 4 steps, shown once per browser (see componentDidMount) ===\n\/\/ Directly addresses the moderated-test finding that amber highlighting and the\n\/\/ pencil edit icon were noticed but not understood without prior exposure.\nconst ONBOARDING_STEPS = [\n  { title: 'Amber highlighting = AI-generated',\n    body: 'Any text highlighted in amber was drafted by AI from the ambient conversation. The blue \"Always verify\" banner is your reminder to review it before it becomes part of the permanent record.' },\n  { title: 'Edit anything, anytime',\n    body: 'The pencil icon on each section lets you correct AI or chart text inline before accepting. Nothing is locked in until you choose to accept it.' },\n  { title: 'Accept clears the highlight',\n    body: 'Reviewing a section and tapping Accept marks it Reviewed and removes the amber. Use \"Accept all\" to review everything at once, or go section by section \u2014 you can always reopen a section later with Re-review.' },\n  { title: 'Two gates protect signing',\n    body: 'Every section must be Accepted, then two acknowledgments confirmed, before you can sign. Signing writes permanently to the chart \u2014 this friction is intentional, not a bug.' },\n];\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'dashboard',\n    clinic: 'ontime',\n    simplified: false,\n    showFlow: false,\n    toasts: [],\n    alertAction: null,\n    alertError: false,\n    agendaChecked: [false,false,false,false,false],\n    whyOpen: -1,\n    transcriptOpen: false,\n    accepted: { S:false, O:false, A:false, P:false },\n    soapError: false,\n    ack1: false, ack2: false,\n    presignError: false,\n    signing: false,\n    signed: false,\n    alertResolved: false,\n    sdohSelected: { food:false, transport:false, lang:false },\n    sdohSubmitted: false,\n    sdohError: false,\n    \/\/ === Onboarding wizard state (first-load only, gated via localStorage) ===\n    onboardingOpen: false,\n    onboardingStep: 0,\n  };\n\n  \/\/ === RESPONSIVE: breakpoint detection ===\n  get _mob(){ return typeof window !== 'undefined' && window.innerWidth < 768; }\n  get _tab(){ return typeof window !== 'undefined' && window.innerWidth >= 768 && window.innerWidth < 1024; }\n\n  \/\/ === Onboarding wizard controls ===\n  onboardingNext() {\n    \/\/ Compute \"is this the last step\" BEFORE setState, since setState updates\n    \/\/ are not guaranteed synchronous \u2014 reading this.state right after calling\n    \/\/ setState can read a stale value.\n    const isLast = this.state.onboardingStep >= ONBOARDING_STEPS.length - 1;\n    if (isLast) {\n      this.setState({ onboardingOpen: false });\n      this._persistOnboardingSeen();\n    } else {\n      this.setState(s => ({ onboardingStep: s.onboardingStep + 1 }));\n    }\n  }\n  onboardingBack() {\n    this.setState(s => ({ onboardingStep: Math.max(0, s.onboardingStep - 1) }));\n  }\n  skipOnboarding() {\n    this.setState({ onboardingOpen: false });\n    this._persistOnboardingSeen();\n  }\n  \/\/ === Manual replay: lets a clinician reopen the tour on demand (e.g. from\n  \/\/ the dashboard's Quick Actions), independent of the localStorage first-load\n  \/\/ gate. Resets to step 0 for a clean run-through regardless of where they\n  \/\/ last left off. ===\n  launchOnboarding() {\n    this.setState({ onboardingOpen: true, onboardingStep: 0 });\n  }\n  _persistOnboardingSeen() {\n    try { if (typeof window !== 'undefined' && window.localStorage) window.localStorage.setItem('lc_onboarding_v1', '1'); }\n    catch(e) { \/* private mode \/ storage disabled \u2014 non-fatal, tour will just show again next load *\/ }\n  }\n\n  componentDidMount(){\n    this._onResize = () => this.forceUpdate();\n    window.addEventListener('resize', this._onResize);\n    \/\/ === Onboarding: show the wizard once per browser, gated via localStorage ===\n    \/\/ Wrapped in try\/catch because localStorage can throw in private-browsing \/\n    \/\/ storage-restricted contexts \u2014 if so, we simply skip onboarding rather than\n    \/\/ block the app from loading.\n    try {\n      if (typeof window !== 'undefined' && window.localStorage && !window.localStorage.getItem('lc_onboarding_v1')) {\n        this.setState({ onboardingOpen: true });\n      }\n    } catch(e) { \/* localStorage unavailable \u2014 non-fatal, onboarding simply won't show *\/ }\n  }\n  componentWillUnmount(){\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  _tid = 0;\n  toast(type, title, msg) {\n    const id = ++this._tid;\n    this.setState(s => ({ toasts: [...s.toasts, { id, type, title, msg }] }));\n    setTimeout(() => this.setState(s => ({ toasts: s.toasts.filter(t => t.id !== id) })), 3600);\n  }\n\n  go(screen) {\n    this.setState({ screen, alertError:false, soapError:false, presignError:false });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  selectAlertAction(a) { this.setState({ alertAction: a, alertError: false }); }\n  deferAlert() {\n    this.toast('info', 'Deferred', 'This alert remains pending \u2014 return to it from the dashboard when ready.');\n    \/\/ Stay on this screen; navigation back is manual via the \"Back to dashboard\" button.\n  }\n  acknowledgeAlert() {\n    if (!this.state.alertAction) { this.setState({ alertError: true }); return; }\n    this.setState({ alertResolved: true });\n    this.toast('success', 'Signed & documented', 'Hyperkalemia plan signed by Dr. Laura Mitchell and audit-logged.');\n    \/\/ Stay on this screen so Dr. Mitchell can review the resolved confirmation \u2014\n    \/\/ she navigates back to the dashboard manually via the button below.\n  }\n\n  toggleAgenda(i) {\n    this.setState(s => { const a = [...s.agendaChecked]; a[i] = !a[i]; return { agendaChecked: a }; });\n  }\n  toggleWhy(i) { this.setState(s => ({ whyOpen: s.whyOpen === i ? -1 : i })); }\n  toggleSdoh(key) {\n    if (this.state.sdohSubmitted) return;\n    this.setState(s => ({ sdohSelected: { ...s.sdohSelected, [key]: !s.sdohSelected[key] }, sdohError: false }));\n  }\n  submitSdoh() {\n    if (this.state.sdohSubmitted) return;\n    const sel = this.state.sdohSelected;\n    const any = sel.food || sel.transport || sel.lang;\n    if (!any) { this.setState({ sdohError: true }); return; }\n    const parts = [];\n    if (sel.food) parts.push('community food bank referral');\n    if (sel.transport) parts.push('telehealth conversion offer');\n    if (sel.lang) parts.push('English after-visit summary confirmed');\n    this.setState({ sdohSubmitted: true, sdohError: false });\n    this.toast('success', 'SDOH actions submitted', parts.join(', ') + ' added to the visit plan.');\n  }\n  startVisit() {\n    this.toast('info', 'Ambient capture enabled', 'Patient consent on file. Listening \u2014 note will draft from the conversation.');\n    setTimeout(() => this.go('soap'), 900);\n  }\n\n  toggleTranscript() { this.setState(s => ({ transcriptOpen: !s.transcriptOpen })); }\n  acceptSection(k) {\n    this.setState(s => ({ accepted: { ...s.accepted, [k]: true }, soapError: false }));\n    this.toast('success', 'Section reviewed', 'Marked as reviewed \u2014 AI highlight cleared.');\n  }\n  \/\/ === NEW: Unaccept \/ Re-review \u2014 lets a clinician reopen a section they've\n  \/\/ already accepted (e.g. they noticed something on a later section and want\n  \/\/ to double-check an earlier one). Restores the amber AI highlighting on that\n  \/\/ section's still-AI-authored lines until it's re-accepted.\n  unacceptSection(k) {\n    this.setState(s => ({ accepted: { ...s.accepted, [k]: false } }));\n    this.toast('info', 'Marked for re-review', 'Section reopened \u2014 amber highlighting restored until re-accepted.');\n  }\n  acceptAll() {\n    this.setState({ accepted: { S:true, O:true, A:true, P:true }, soapError: false });\n    this.toast('success', 'All sections accepted', 'Four sections marked reviewed. Sign is now available.');\n  }\n  attemptSoapSign() {\n    const a = this.state.accepted;\n    if (!(a.S && a.O && a.A && a.P)) { this.setState({ soapError: true }); return; }\n    this.go('presign');\n  }\n\n  toggleAck1() { this.setState(s => ({ ack1: !s.ack1, presignError: false })); }\n  toggleAck2() { this.setState(s => ({ ack2: !s.ack2, presignError: false })); }\n  finalSign() {\n    \/\/ === Improved pre-sign gate: error prevention + retry ===\n    \/\/ In addition to the existing banner, move keyboard\/screen-reader focus to\n    \/\/ the first unchecked acknowledgment so the retry path is immediate rather\n    \/\/ than requiring the user to hunt for what's missing.\n    if (!(this.state.ack1 && this.state.ack2)) {\n      this.setState({ presignError: true });\n      if (typeof document !== 'undefined') {\n        const targetId = !this.state.ack1 ? 'lc-ack1' : 'lc-ack2';\n        setTimeout(() => { const el = document.getElementById(targetId); if (el && el.focus) el.focus(); }, 0);\n      }\n      return;\n    }\n    if (this.state.signing) return;\n    this.setState({ signing: true });\n    this.toast('info', 'Submitting to chart', 'FHIR write-back in progress\u2026');\n    setTimeout(() => {\n      this.setState({ signed: true, signing: false });\n      this.toast('success', 'Note signed', 'Write-back complete and orders released.');\n    }, 1200);\n  }\n\n  restart() {\n    this.setState({\n      screen:'dashboard', clinic:'ontime', simplified:false, showFlow:false,\n      alertAction:null, alertError:false, alertResolved:false, agendaChecked:[false,false,false,false,false], whyOpen:-1,\n      transcriptOpen:false, accepted:{S:false,O:false,A:false,P:false}, soapError:false,\n      ack1:false, ack2:false, presignError:false, signing:false, signed:false,\n    });\n    if (typeof window !== 'undefined') window.scrollTo(0, 0);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const mob = this._mob, tab = this._tab, sm = mob || tab;\n    const t = (type, title, msg) => () => this.toast(type, title, msg);\n    \/\/ Keyboard handler for div[role=\"button\"] \u2014 Enter\/Space activation (WCAG 2.1.1)\n    const kd = fn => e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();fn();} };\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ RESPONSIVE LAYOUT TOKENS\n    \/\/ Breakpoints: mobile <768px | tablet 768\u20131023px | desktop \u22651024px\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    const mainPad       = mob ? '16px 14px 64px'  : tab ? '20px 20px 64px'  : '24px 28px 64px';\n    \/\/ Mirrors mainPad's horizontal component exactly (14\/20\/28) so the header's\n    \/\/ content aligns pixel-for-pixel with the main content below it.\n    const headerPadX    = mob ? '14px' : tab ? '20px' : '28px';\n    const headerGap     = mob ? '8px'              : '16px';\n    \/\/ Header content is now wrapped in an inner max-width container (see markup)\n    \/\/ matching whichever screen is active, so its left\/right edges line up with\n    \/\/ that screen's <main> content instead of sitting flush against the browser\n    \/\/ edges on wide monitors while the content below is centered and narrower.\n    const headerMaxWidth = s.screen === 'dashboard' ? '1280px'\n      : s.screen === 'alert'    ? '820px'\n      : s.screen === 'snapshot' ? '1080px'\n      : s.screen === 'soap'     ? '980px'\n      : s.screen === 'presign'  ? '720px'\n      : '1280px';\n    \/\/ KPI grid: mobile\/tablet 2\u00d72, desktop 4\u00d71 (or 2\u00d72 in simplified)\n    const kpiCols       = (mob || tab) ? '1fr 1fr' : (s.simplified ? '1fr 1fr' : 'repeat(4,1fr)');\n    const kpiGridStyle  = `display:grid;grid-template-columns:${kpiCols};gap:${mob?'8px':'12px'};`;\n    \/\/ Dashboard columns: mobile stack, tablet 1.2\/1, desktop 1.7\/1\n    const dashColsStyle = mob\n      ? 'display:flex;flex-direction:column;gap:14px;'\n      : tab ? `display:grid;grid-template-columns:${s.simplified?'1fr':'1.2fr 1fr'};gap:14px;`\n      : `display:grid;grid-template-columns:${s.simplified?'1fr':'1.7fr 1fr'};gap:18px;`;\n    \/\/ Snapshot grid: mobile stack, tablet 1\/1, desktop 1.4\/1\n    const snapGridStyle = mob\n      ? 'display:flex;flex-direction:column;gap:14px;'\n      : tab ? 'display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;'\n      : 'display:grid;grid-template-columns:1.4fr 1fr;gap:14px;align-items:start;';\n    \/\/ Alert cards: stacked on mobile, side-by-side otherwise\n    const alertCardsStyle = mob\n      ? 'display:flex;flex-direction:column;gap:14px;margin-bottom:16px;'\n      : 'display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;';\n    \/\/ Toast: full-width strip on mobile, fixed corner on desktop\n    const toastContainerStyle = mob\n      ? 'position:fixed;right:10px;bottom:10px;left:10px;z-index:80;display:flex;flex-direction:column;gap:10px;'\n      : 'position:fixed;right:20px;bottom:20px;z-index:80;display:flex;flex-direction:column;gap:10px;max-width:380px;';\n    \/\/ Flow overlay\n    const flowOverlayPad = mob ? '16px 10px' : '40px 20px';\n    co herence review (LDL 88)', source:'ACC\/AHA', rationale:'Moderate-intensity statin for diabetes; confirm adherence given prior gaps.' },\n    ];\n    const agenda = agendaDefs.map((g, i) => {\n      const checked = s.agendaChecked[i];\n      return { ...g, checked, open: s.whyOpen === i,\n        toggle:()=>this.toggleAgenda(i), why:()=>this.toggleWhy(i),\n        check: checked ? '\u2713' : '', boxBg: checked ? '#1D9E75' : '#fff', boxBorder: checked ? '#1D9E75' : '#C4C3BB',\n        textColor: checked ? '#888780' : '#2A2A28', strike: checked ? 'line-through' : 'none',\n        aria: (checked ? 'Uncheck: ' : 'Check: ') + g.label };\n    });\n    const agendaCount = s.agendaChecked.filter(Boolean).length;\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ SDOH \u2014 checkbox + confirm-submit pattern (replaces instant-action links)\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    const sdohDefs = [\n      { key:'food', title:'Food insecurity', detail:'Hunger Vital Sign positive (2\/2)', severity:'High', sevColor:'#E24B4A', sevBg:'#FBE7E7', dot:'#E24B4A', actionLabel:'Refer to community food bank' },\n      { key:'transport', title:'Transportation barrier', detail:'2 of 6 visits missed in 12 months', severity:'Moderate', sevColor:'#9A6B14', sevBg:'#FAEEDA', dot:'#EF9F27', actionLabel:'Offer telehealth conversion' },\n      { key:'lang', title:'Language preference', detail:'English preferred for written material', severity:'Note', sevColor:'#9A6B14', sevBg:'#FAEEDA', dot:'#EF9F27', actionLabel:'Confirm English after-visit summary' },\n    ];\n    const sdohItems = sdohDefs.map(d => {\n      const checked = s.sdohSelected[d.key];\n      return { ...d, checked,\n        toggle:()=>this.toggleSdoh(d.key),\n        aria:(checked?'Deselect: ':'Select: ')+d.title,\n        check: checked?'\u2713':'',\n        boxBg: checked?'#1D9E75':'#fff',\n        boxBorder: checked?'#1D9E75':'#C4C3BB',\n      };\n    });\n    const sdohAnySelected = s.sdohSelected.food || s.sdohSelected.transport || s.sdohSelected.lang;\n    \/\/ NEW: used by the persistent visit-context bar on the SOAP and Pre-sign screens.\n    const sdohSelectedCount = Object.values(s.sdohSelected).filter(Boolean).length;\n    const sdohSubmitBg = s.sdohSubmitted ? '#888780' : (sdohAnySelected ? '#1D9E75' : '#D8D7D0');\n    const sdohSubmitLabel = s.sdohSubmitted ? 'Submitted \u2713' : 'Submit selected actions';\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ SOAP SECTIONS\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    const acc = s.accepted;\n    const soapDefs = [\n      { key:'S', letter:'S', title:'Subjective', lines:[\n        { ai:true,  text:'Reports increased fatigue over the past three weeks. Denies polyuria or polydipsia.' },\n        { ai:true,  text:'States fresh food is hard to afford; eating mostly canned goods.' },\n        { ai:false, text:'Patient-reported metformin adherence: twice daily, ~1 week supply remaining.' },\n      ]},\n      { key:'O', letter:'O', title:'Objective', lines:[\n        { ai:false, text:'BP 146\/90 \u00b7 HR 78 \u00b7 Wt 182 lb \u00b7 BMI 31.2.' },\n        { ai:false, text:'HbA1c 7.2% (down from 7.8%) \u00b7 LDL 88 \u00b7 eGFR 64.' },\n        { ai:true,  text:'No acute distress. Exam unremarkable per dictation.' },\n      ]},\n      { key:'A', letter:'A', title:'Assessment', lines:[\n        { ai:true,  text:'T2DM, improving but above goal. HTN, suboptimally controlled. Hyperlipidemia, stable.' },\n        { ai:false, text:'SDOH: food insecurity (High) \u2014 refer community food bank.' },\n      ]},\n      { key:'P', letter:'P', title:'Plan', lines:[\n        { ai:true,  text:'Continue metformin 1000 mg BID; refill \u00d790 days. Recheck HbA1c in 3 months.' },\n        { ai:true,  text:'Intensify HTN management; diabetic foot exam today.' },\n        { ai:false, text:'Food bank referral + telehealth conversion offered. Spanish after-visit summary.' },\n      ]},\n    ];\n    const soapSections = soapDefs.map(sec => {\n      const isAcc = acc[sec.key];\n      return {\n        key: sec.key, letter: sec.letter, title: sec.title,\n        accept:()=>this.acceptSection(sec.key), notAccepted: !isAcc,\n        \/\/ NEW: exposes the positive boolean (template can't evaluate !notAccepted\n        \/\/ inline \u2014 this engine only does property lookups in {{ }} bindings) plus\n        \/\/ the unaccept handler, both needed for the Re-review control.\n        sectionAccepted: isAcc, unaccept:()=>this.unacceptSection(sec.key),\n        acceptAriaLabel: `Accept ${sec.title} section \u2014 marks AI draft as reviewed`,\n        edge: isAcc ? '#1D9E75' : '#EF9F27', cardBorder: isAcc ? '#BFE3D2' : '#E2E1DA',\n        badge: isAcc ? 'Reviewed' : 'AI draft',\n        badgeColor: isAcc ? '#157A58' : '#9A6B14', badgeBg: isAcc ? '#EEF7F2' : '#FAEEDA',\n        lines: sec.lines.map(l => ({ text: l.text, bg: (l.ai && !isAcc) ? '#FAEEDA' : 'transparent' })),\n      };\n    });\n    const acceptedCount = Object.values(acc).filter(Boolean).length;\n    const allAccepted   = acceptedCount === 4;\n    const missing       = soapDefs.filter(d => !acc[d.key]).map(d => d.title);\n    const soapErrorDetail = 'Still to review: ' + (missing.join(', ') || 'none') + '. Use Accept on each section, or Accept all.';\n    \/\/ NEW: persistent remaining-sections indicator (always visible, not just on\n    \/\/ error) \u2014 a lower-friction way to see what's left without triggering the\n    \/\/ error state first.\n    const remainingLabel = missing.length\n      ? `${missing.length} remaining: ${missing.join(', ')}`\n      : 'All sections reviewed';\n    const remainingColor = missing.length ? '#6B6A64' : '#157A58';\n    const soapSignStyle = allAccepted\n      ? 'height:48px;padding:0 22px;border-radius:10px;border:none;background:#534AB7;color:#fff;font-size:15.5px;font-weight:500;cursor:pointer;min-width:200px;'\n      : 'height:48px;padding:0 22px;border-radius:10px;border:none;background:#D8D7D0;color:#fff;font-size:15.5px;font-weight:500;cursor:not-allowed;min-width:200px;';\n    const soapSignLabel = allAccepted ? 'Continue to sign \u2192' : 'Sign locked \u2014 review all sections';\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ PRE-SIGN\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    const finalReady    = s.ack1 && s.ack2;\n    const finalSignStyle = s.signing\n      ? 'margin-top:16px;width:100%;height:52px;border-radius:10px;border:none;background:#188862;color:#fff;font-size:16px;font-weight:500;cursor:wait;'\n      : finalReady\n      ? 'margin-top:16px;width:100%;height:52px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:16px;font-weight:500;cursor:pointer;'\n      : 'margin-top:16px;width:100%;height:52px;border-radius:10px;border:none;background:#D8D7D0;color:#fff;font-size:16px;font-weight:500;cursor:not-allowed;';\n    const finalSignLabel = s.signing ? 'Writing to chart\u2026' : (finalReady ? 'Sign as Dr. Laura Mitchell' : 'Complete both acknowledgments to sign');\n    \/\/ NEW: improved pre-sign gate \u2014 names exactly which acknowledgment(s) are\n    \/\/ missing (mirrors the soapErrorDetail pattern already used above) and\n    \/\/ gives each checkbox its own error-aware border color, so a failed\n    \/\/ sign attempt visually points at the specific unchecked item(s) rather\n    \/\/ than only a generic banner.\n    const ackConfirmedCount = (s.ack1 ? 1 : 0) + (s.ack2 ? 1 : 0);\n    const missingAcks = [];\n    if (!s.ack1) missingAcks.push('review confirmation');\n    if (!s.ack2) missingAcks.push('orders confirmation');\n    const presignErrorDetail = missingAcks.length\n      ? `Missing: ${missingAcks.join(' and ')}. Check the box${missingAcks.length>1?'es':''} above, then try again.`\n      : '';\n    const ack1BorderErr = s.ack1 ? '#1D9E75' : (s.presignError ? '#E24B4A' : '#C4C3BB');\n    const ack2BorderErr = s.ack2 ? '#1D9E75' : (s.presignError ? '#E24B4A' : '#C4C3BB');\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ ONBOARDING WIZARD\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ Template bindings can only do property lookups, not inline JS expressions,\n    \/\/ so every derived value the wizard needs (current step text, dot colors,\n    \/\/ button label, first\/last-step flags) is precomputed here.\n    const onboardingStepIdx = Math.min(s.onboardingStep, ONBOARDING_STEPS.length - 1);\n    const obStep = ONBOARDING_STEPS[onboardingStepIdx];\n    const onboardingIsLast = onboardingStepIdx >= ONBOARDING_STEPS.length - 1;\n    const onboardingIsFirst = onboardingStepIdx === 0;\n    const obDots = ONBOARDING_STEPS.map((_, i) => ({ color: i === onboardingStepIdx ? '#534AB7' : '#E2E1DA' }));\n\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    \/\/ HEADER COMPUTED STATES\n    \/\/ \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n    const behind = s.clinic === 'behind';\n    const clinicBadgeStyle = 'height:36px;padding:0 12px;border-radius:8px;border:0.5px solid '+(behind?'#EFD4A0':'#BFE3D2')+';background:'+(behind?'#FBF6EC':'#EEF7F2')+';color:'+(behind?'#9A6B14':'#157A58')+';font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;white-space:nowrap;';\n    \/\/ Descriptive aria-labels communicate state to screen readers\n    const clinicAriaLabel  = `Clinic status: ${behind ? 'running behind' : 'on time'}. Tap to toggle.`;\n    const simpAriaLabel    = s.simplified ? 'Switch to standard view' : 'Switch to simplified view';\n\n    return {\n            \/\/ screen flags\n      isDashboard: s.screen==='dashboard', isAlert: s.screen==='alert',\n      isSnapshot:  s.screen==='snapshot',  isSoap:  s.screen==='soap', isPresign: s.screen==='presign',\n      goDashboard:()=>this.go('dashboard'), goAlerts:()=>this.go('alert'), goSoap:()=>this.go('soap'), goSnapshot:()=>this.go('snapshot'),\n      startNext:()=>this.go('snapshot'),\n      \/\/ responsive layout tokens\n      mainPad, headerPadX, headerGap, headerMaxWidth, kpiGridStyle, dashColsStyle, snapGridStyle,\n      alertCardsStyle, toastContainerStyle, flowOverlayPad, flowInnerPad, flowNotesCols,\n      \/\/ header\n      simplified: s.simplified, showFlow: s.showFlow,\n      toggleClinic:()=>{ const next = behind ? 'ontime' : 'behind'; this.setState({clinic: next}); this.toast('info', next==='behind' ? 'Now showing: running behind' : 'Now showing: on time', next==='behind' ? 'This flips the schedule badge staff and the front desk see today \u2014 patients are not notified automatically.' : 'Clinic marked back on schedule for staff and the front desk.'); },\n      toggleSimplified:()=>this.setState(st=>({simplified:!st.simplified})),\n      toggleFlow:()=>this.setState(st=>({showFlow:!st.showFlow})),\n      stop:(e)=>{ if(e&&e.stopPropagation) e.stopPropagation(); },\n      clinicLabel: behind ? 'Running behind' : 'On time', clinicDot: behind ? '#EF9F27' : '#1D9E75',\n      clinicBadgeStyle, clinicAriaLabel, simpAriaLabel,\n      simpLabel: s.simplified ? 'Standard view' : 'Simplified view',\n      simpBtnStyle: 'height:36px;padding:0 12px;border-radius:8px;border:0.5px solid '+(s.simplified?'#1D9E75':'#E2E1DA')+';background:'+(s.simplified?'#EEF7F2':'#fff')+';color:'+(s.simplified?'#157A58':'#2A2A28')+';font-size:14px;white-space:nowrap;',\n      showQuickActions: !s.simplified,\n      \/\/ onboarding wizard\n      onboardingOpen: s.onboardingOpen,\n      onboardingTitle: obStep.title, onboardingBody: obStep.body,\n      onboardingStepNum: onboardingStepIdx + 1, onboardingStepTotal: ONBOARDING_STEPS.length,\n      obDots, onboardingIsFirst, onboardingShowBack: !onboardingIsFirst,\n      onboardingNextLabel: onboardingIsLast ? 'Done' : 'Next',\n      onboardingNext:()=>this.onboardingNext(), onboardingBack:()=>this.onboardingBack(),\n      skipOnboarding:()=>this.skipOnboarding(),\n      launchOnboarding:()=>this.launchOnboarding(),\n      \/\/ dashboard\n      patients, alerts,\n      toastNotes: t('warning','Sign queue','3 notes from yesterday are pending your signature.'),\n      toastMessages: t('info','Team messages','5 unread messages from the care team.'),\n      \/\/ alert screen\n      alertActions, alertError: s.alertError, acknowledgeAlert:()=>this.acknowledgeAlert(), deferAlert:()=>this.deferAlert(),\n      isResolved: s.alertResolved, notResolved: !s.alertResolved, resolvedActionLabel,\n      alertsPendingCount, hasCriticalAlert, kpiAlertsCardStyle, kpiAlertsIconColor, kpiAlertsIcon, kpiAlertsCta, kpiAlertsAria,\n      \/\/ snapshot\n      agenda, agendaCount, startVisit:()=>this.startVisit(),\n      toastChart:    t('info','Full chart','Opening the complete record in a new workspace.'),\n      sdohItems, sdohError: s.sdohError, sdohSubmitBg, sdohSubmitLabel, sdohSubmitted: s.sdohSubmitted, submitSdoh:()=>this.submitSdoh(),\n      sdohSelectedCount,\n      toastRescreen: t('info','What is SDOH re-screening?','Sends the standard Hunger Vital Sign, housing and transportation questionnaire to the patient before their next visit, so social risk factors stay current.'),\n      toastTone:     t('info','About \"Tone: Standard\"','Controls phrasing of the AI-drafted note. Standard uses concise clinical shorthand; this prototype does not yet support switching tones.'),\n      \/\/ soap\n      transcriptOpen: s.transcriptOpen, transcriptLabel: s.transcriptOpen ? 'Hide transcript' : 'Show Appointment Transcript',\n      toggleTranscript:()=>this.toggleTranscript(),\n      acceptAll:()=>this.acceptAll(), soapSections, acceptedCount,\n      remainingLabel, remainingColor,\n      attemptSoapSign:()=>this.attemptSoapSign(), signLocked: !allAccepted,\n      soapSignStyle, soapSignLabel, soapError: s.soapError, soapErrorDetail,\n      toastEdit:        t('info','Edit mode','Inline editing \u2014 change AI or chart text before accepting.'),\n      toastAddOrder:    t('info','Add order','Order search opened.'),\n      toastTranscript:  t('info','Full transcript','Opening the complete speaker-labeled transcript.'),\n      \/\/ pre-sign\n      signed: s.signed, notSigned: !s.signed,\n      presignAriaLabel: s.signed ? 'Note signed successfully' : 'Confirm and sign note',\n      ack1: s.ack1, ack2: s.ack2,\n      toggleAck1:()=>this.toggleAck1(), toggleAck2:()=>this.toggleAck2(),\n      ack1Check: s.ack1?'\u2713':'', ack1Bg: s.ack1?'#1D9E75':'#fff', ack1Border: ack1BorderErr,\n      ack2Check: s.ack2?'\u2713':'', ack2Bg: s.ack2?'#1D9E75':'#fff', ack2Border: ack2BorderErr,\n      ackConfirmedCount,\n      presignError: s.presignError, presignErrorDetail, finalSign:()=>this.finalSign(), finalLocked: !finalReady,\n      finalSignStyle, finalSignLabel,\n      toastSpanish: t('success','Summary sent','English after-visit summary sent to the patient portal.'),\n      restart:()=>this.restart(),\n      \/\/ toasts\n      toasts,\n    };\n  }\n}\n\n<\/script>\n\n\n<\/body><\/html>"</script>
